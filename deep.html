<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CQC Business Solutions | Premium Workspace Furniture</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0a1a3a;
            --navy2: #122b5e;
            --blue: #1e40af;
            --blue2: #3b82f6;
            --blue-lt: #eff6ff;
            --sky: #7ab3f0;
            --ice: #d9e8ff;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --text: #1f2937;
            --text2: #4b5563;
            --muted: #6b7280;
            --muted2: #9ca3af;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fafcff 0%, #f0f5ff 50%, #f5f9ff 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .font-serif {
            font-family: 'Fraunces', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(30, 64, 175, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--navy), var(--blue)); border-radius: 10px; }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        @keyframes badgePop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .pulse-ring { animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .badge-pop { animation: badgePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); }
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(30, 64, 175, 0.12);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
            border-color: rgba(30, 64, 175, 0.25);
            background: rgba(255, 255, 255, 0.95);
        }

        /* 3D Viewer */
        .viewer-3d-container {
            perspective: 1200px;
            transform-style: preserve-3d;
        }
        .viewer-3d-object {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            cursor: grab;
        }
        .viewer-3d-object:active { cursor: grabbing; }

        /* Product Card */
        .product-card {
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            transform-style: preserve-3d;
        }
        .product-card:hover {
            transform: translateY(-10px) rotateX(2deg);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.2);
        }

        /* Status Badges */
        .status-pending { background: rgba(245, 158, 11, 0.12); color: #b45309; border: 1px solid rgba(245, 158, 11, 0.25); }
        .status-approved { background: rgba(29, 78, 216, 0.12); color: var(--blue); border: 1px solid rgba(29, 78, 216, 0.25); }
        .status-shipped { background: rgba(99, 102, 241, 0.12); color: #4f46e5; border: 1px solid rgba(99, 102, 241, 0.25); }
        .status-out_for_delivery { background: rgba(245, 158, 11, 0.12); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.25); }
        .status-delivered { background: rgba(16, 185, 129, 0.12); color: #059669; border: 1px solid rgba(16, 185, 129, 0.25); }

        /* Chatbot */
        .chatbot-container {
            position: fixed;
            bottom: 90px;
            right: 24px;
            z-index: 1000;
        }
        .chatbot-toggle {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            box-shadow: 0 8px 25px rgba(30, 64, 175, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .chatbot-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(30, 64, 175, 0.5);
        }
        .chatbot-window {
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 380px;
            height: 500px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(30, 64, 175, 0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: fadeUp 0.3s ease;
        }
        .chatbot-window.open { display: flex; }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(10, 26, 58, 0.6);
            backdrop-filter: blur(8px);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.2s ease;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            border: 1px solid rgba(30, 64, 175, 0.15);
            animation: fadeUp 0.3s ease;
        }
        .modal-content.wide { max-width: 800px; }

        /* Timeline */
        .timeline-item {
            position: relative;
            padding-left: 32px;
            padding-bottom: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--blue));
        }
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 16px;
            width: 2px;
            height: calc(100% - 12px);
            background: linear-gradient(to bottom, var(--blue), rgba(30, 64, 175, 0.2));
        }
        .timeline-item:last-child::after { display: none; }

        /* Input Styles */
        .input-modern {
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid rgba(30, 64, 175, 0.15);
            border-radius: 14px;
            padding: 12px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            width: 100%;
        }
        .input-modern:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 64, 175, 0.3);
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(30, 64, 175, 0.2);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-glass:hover {
            background: white;
            border-color: var(--blue);
            transform: translateY(-1px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(30, 64, 175, 0.2);
            animation: fadeUp 0.3s ease;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chatbot-window { width: 320px; right: -20px; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ============ PRODUCT DATABASE ============
    const PRODUCTS = [
        { id: 1, name: "Victor Executive Chair", price: 2150, category: "Executive", rating: 4.8, inStock: true, img: "https://images.unsplash.com/photo-1589384267710-7a170981ca78?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1589384267710-7a170981ca78?w=800&h=600&fit=crop", "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=800&h=600&fit=crop"], description: "Premium ergonomic chair with sync mechanism, 4D armrests and breathable mesh back. Rated for 8+ hours of comfortable seating.", specs: "Weight: 150kg · Height: 110-125cm · Warranty: 3 years", colors: ["#0a1a3a", "#1e40af", "#374151"] },
        { id: 2, name: "Pinnacle Highback", price: 3450, category: "Executive", rating: 4.9, inStock: true, img: "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=800&h=600&fit=crop"], description: "Luxury kneetilt executive chair with memory foam padding. Full grain leather with polished aluminium base.", specs: "Weight: 180kg · Height: 115-130cm · Warranty: 5 years", colors: ["#0a1a3a", "#1e293b", "#92400e"] },
        { id: 3, name: "Big Ben Heavy Duty", price: 2850, category: "Heavy Duty", rating: 4.7, inStock: true, img: "https://images.unsplash.com/photo-1616627562426-7b7b1f3d4a7f?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1616627562426-7b7b1f3d4a7f?w=800&h=600&fit=crop"], description: "160kg rated heavy-duty chair with solid wood base and arms. Built for long-lasting durability.", specs: "Weight: 160kg · Seat: 55cm · Warranty: 3 years", colors: ["#2d1f12", "#1f2937"] },
        { id: 4, name: "Mia Tub Chair", price: 1890, category: "Soft Seating", rating: 4.6, inStock: true, img: "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800&h=600&fit=crop"], description: "Stylish ergonomic tub design, perfect for reception areas and executive lounges.", specs: "Weight: 120kg · Warranty: 2 years", colors: ["#7c3aed", "#db2777", "#059669"] },
        { id: 5, name: "Sonic Typist Chair", price: 1250, category: "Task", rating: 4.5, inStock: true, img: "https://images.unsplash.com/photo-1616627562426-7b7b1f3d4a7f?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1616627562426-7b7b1f3d4a7f?w=800&h=600&fit=crop"], description: "Breathable mesh back task chair ideal for daily office use with adjustable height.", specs: "Weight: 120kg · Height: 90-105cm · Warranty: 2 years", colors: ["#1e293b", "#334155"] },
        { id: 6, name: "Industrial PU Stool", price: 890, category: "Industrial", rating: 4.4, inStock: true, img: "https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?w=800&h=600&fit=crop"], description: "Heavy-duty polyurethane stool for industrial environments. Hardwearing and easy to clean.", specs: "Weight: 150kg · Height: 60-85cm · Warranty: 1 year", colors: ["#1f2937", "#4b5563"] },
        { id: 7, name: "Cora Executive Tub", price: 2290, category: "Soft Seating", rating: 4.7, inStock: true, img: "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=800&h=600&fit=crop"], description: "Elegant chrome-base tub chair for executive lounges. Premium upholstery with swivel base.", specs: "Weight: 130kg · Swivel base · Warranty: 2 years", colors: ["#a855f7", "#ec489a", "#0a1a3a"] },
        { id: 8, name: "Sky Executive Chair", price: 3890, category: "Executive", rating: 4.9, inStock: true, img: "https://images.unsplash.com/photo-1589384267710-7a170981ca78?w=400&h=280&fit=crop", gallery: ["https://images.unsplash.com/photo-1589384267710-7a170981ca78?w=800&h=600&fit=crop"], description: "Polished aluminium base with full-grain leather and adjustable headrest. Statement executive seating.", specs: "Weight: 160kg · Height: 115-135cm · Warranty: 5 years", colors: ["#0a1a3a", "#1e293b", "#92400e"] }
    ];

    const SERVICES = [
        { id: "refurbishment", name: "🔧 Refurbishment", description: "Restore your existing furniture", action: "Get Quote", path: "#" },
        { id: "installation", name: "🏗️ Installation", description: "Professional project installation", action: "Book Now", path: "#" },
        { id: "rental", name: "📅 Rental Solutions", description: "Flexible furniture rental", action: "Inquire", path: "#" },
        { id: "repair", name: "🛠️ Repair Service", description: "Expert repair & maintenance", action: "Request Repair", path: "#" },
        { id: "components", name: "⚙️ Components", description: "Spare parts & accessories", action: "Shop Now", path: "#" },
        { id: "consultation", name: "👥 Consultation", description: "Free workspace assessment", action: "Book Now", path: "#" }
    ];

    const USERS = [
        { id: "user_1", email: "customer@cqc.co.za", password: "1234", name: "James Wilson", role: "customer", avatar: "JW", createdAt: new Date().toISOString(), welcomeEmailSent: false, signupDiscountCode: "WELCOME15", signupDiscountUsed: false },
        { id: "admin_1", email: "admin@cqc.co.za", password: "admin123", name: "Sarah Chen", role: "admin", avatar: "SC", createdAt: new Date().toISOString(), welcomeEmailSent: true, signupDiscountCode: "", signupDiscountUsed: true }
    ];

    // ============ STORAGE ============
    function getStorage(key, defaultValue) { 
        const val = localStorage.getItem(key);
        return val ? JSON.parse(val) : defaultValue;
    }
    function setStorage(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    
    let currentUser = getStorage('cqc_user', null);
    let cart = getStorage('cqc_cart', []);
    let orders = getStorage('cqc_orders', []);
    let notifications = getStorage('cqc_notifications', []);
    let signupEvents = getStorage('cqc_signups', []);
    let repairRequests = getStorage('cqc_repairs', []);
    let currentTab = 'shop';
    let currentCategory = 'All';
    let searchQuery = '';

    // ============ HELPERS ============
    function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><span>${msg}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }

    function addNotification(userId, title, message, type = 'info', metadata = {}) {
        const newNotif = {
            id: Date.now(),
            userId, title, message, type,
            read: false,
            createdAt: new Date().toISOString(),
            metadata
        };
        notifications.unshift(newNotif);
        setStorage('cqc_notifications', notifications);
        if (currentUser && currentUser.id === userId) {
            showToast(title + ': ' + message, type);
            renderApp();
        }
        return newNotif;
    }

    function getUserNotifications() {
        if (!currentUser) return [];
        return notifications.filter(n => n.userId === currentUser.id).sort((a,b) => b.id - a.id);
    }

    function markNotificationRead(id) {
        const idx = notifications.findIndex(n => n.id === id);
        if (idx !== -1) notifications[idx].read = true;
        setStorage('cqc_notifications', notifications);
        renderApp();
    }

    // ============ AUTH ============
    function login(email, password) {
        const user = USERS.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = { ...user, lastLogin: new Date().toISOString() };
            setStorage('cqc_user', currentUser);
            showToast(`Welcome back, ${user.name}! 🎉`, 'success');
            
            // Record signup event if new user
            if (!signupEvents.find(e => e.userId === user.id)) {
                const newEvent = {
                    id: Date.now().toString(),
                    userId: user.id,
                    userEmail: user.email,
                    userName: user.name,
                    timestamp: new Date().toISOString(),
                    welcomeSent: false,
                    discountCode: user.role === 'customer' ? 'WELCOME15' : null,
                    discountUsed: false
                };
                signupEvents.unshift(newEvent);
                setStorage('cqc_signups', signupEvents);
                
                // Notify admin of new signup
                addNotification('admin_1', '🎉 New User Signup!', `${user.name} (${user.email}) just created an account. Send them a welcome discount!`, 'signup', { userId: user.id });
                
                // Send welcome notification to user
                if (user.role === 'customer') {
                    addNotification(user.id, '🎁 Welcome to CQC!', `Use code ${newEvent.discountCode} for 15% off your first order. Happy shopping!`, 'success', { discountCode: newEvent.discountCode });
                }
            }
            
            renderApp();
        } else {
            showToast('Invalid email or password', 'error');
        }
    }

    function logout() {
        currentUser = null;
        cart = [];
        setStorage('cqc_user', null);
        setStorage('cqc_cart', []);
        showToast('Logged out successfully', 'info');
        renderApp();
    }

    // ============ CART ============
    function addToCart(product) {
        if (!currentUser) { showToast('Please sign in to add items to cart', 'info'); return; }
        const existing = cart.find(i => i.id === product.id);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        setStorage('cqc_cart', cart);
        showToast(`${product.name} added to cart! 🛒`, 'success');
        renderApp();
    }

    function updateCartQty(id, delta) {
        const idx = cart.findIndex(i => i.id === id);
        if (idx !== -1) {
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
            setStorage('cqc_cart', cart);
            renderApp();
        }
    }

    function clearCart() { cart = []; setStorage('cqc_cart', cart); renderApp(); }

    // ============ CHECKOUT ============
    function checkout() {
        if (!currentUser) { showToast('Please sign in to checkout', 'info'); return; }
        if (cart.length === 0) { showToast('Your cart is empty', 'error'); return; }
        
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const newOrder = {
            id: Date.now().toString(),
            orderNumber: `CQC-${Date.now().toString().slice(-8)}`,
            items: [...cart],
            total: total,
            status: 'pending',
            updates: [{ timestamp: new Date().toISOString(), message: 'Order placed successfully', type: 'info' }],
            customer: { id: currentUser.id, name: currentUser.name, email: currentUser.email },
            createdAt: new Date().toISOString(),
            tracking: {
                carrier: 'CQC Logistics',
                trackingNumber: `TRK${Math.random().toString(36).substr(2, 8).toUpperCase()}`,
                estimatedDelivery: new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toLocaleDateString(),
                history: [{ timestamp: new Date().toISOString(), location: 'CQC Warehouse', status: 'Order Received', description: 'Your order has been received and is being processed.' }]
            }
        };
        orders.unshift(newOrder);
        setStorage('cqc_orders', orders);
        cart = [];
        setStorage('cqc_cart', cart);
        
        // Notify admin
        addNotification('admin_1', '📦 New Order!', `Order #${newOrder.orderNumber} from ${currentUser.name} - R${total.toLocaleString()}`, 'order', { orderId: newOrder.id });
        
        // Notify customer
        addNotification(currentUser.id, '✅ Order Confirmed!', `Your order #${newOrder.orderNumber} has been received. We'll notify you when it ships.`, 'success', { orderId: newOrder.id });
        
        showToast(`Order placed! #${newOrder.orderNumber}`, 'success');
        renderApp();
    }

    // ============ ADMIN FUNCTIONS ============
    function approveOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (order && order.status === 'pending') {
            order.status = 'approved';
            order.updates.push({ timestamp: new Date().toISOString(), message: 'Order approved by admin', type: 'success' });
            setStorage('cqc_orders', orders);
            addNotification(order.customer.id, '✅ Order Approved!', `Your order #${order.orderNumber} has been approved and is being prepared for shipping.`, 'success', { orderId });
            addNotification('admin_1', '✅ Order Approved', `Order #${order.orderNumber} was approved`, 'success');
            showToast('Order approved!', 'success');
            renderApp();
        }
    }

    function updateOrderStatus(orderId, status, customMessage = null) {
        const order = orders.find(o => o.id === orderId);
        if (order) {
            const prevStatus = order.status;
            order.status = status;
            order.updates.push({ timestamp: new Date().toISOString(), message: customMessage || `Order status updated to ${status.replace('_', ' ').toUpperCase()}`, type: 'info' });
            
            if (order.tracking && status === 'shipped') {
                order.tracking.history.push({ timestamp: new Date().toISOString(), location: 'CQC Distribution Center', status: 'Shipped', description: 'Your order has been shipped and is on its way!' });
            }
            if (order.tracking && status === 'out_for_delivery') {
                order.tracking.history.push({ timestamp: new Date().toISOString(), location: 'Local Delivery Hub', status: 'Out for Delivery', description: 'Your order is out for delivery today!' });
            }
            if (order.tracking && status === 'delivered') {

    // ============ 3D VIEWER ============
    function open3DViewer(product) {
        let rotX = 0, rotY = 0, zoom = 1, isDragging = false, startX, startY;
        
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.innerHTML = `
            <div class="modal-content wide">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div><h3 style="font-size: 24px;">${product.name}</h3><p style="color: var(--muted);">360° Interactive View</p></div>
                    <button class="btn-glass" onclick="this.closest('.modal-backdrop').remove()" style="padding: 8px 16px;">✕ Close</button>
                </div>
                <div id="viewerContainer" style="height: 400px; background: linear-gradient(135deg, #0a1a3a, #1e40af); border-radius: 20px; position: relative; overflow: hidden; cursor: grab;">
                    <canvas id="viewerCanvas" width="800" height="400" style="width: 100%; height: 100%; display: block;"></canvas>
                    <div style="position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; color: white; font-size: 12px;">🖱️ Drag to rotate | Scroll to zoom</div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
                    ${product.colors.map(c => `<button class="color-btn" data-color="${c}" style="width: 40px; height: 40px; background: ${c}; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s;"></button>`).join('')}
                    <button id="resetViewBtn" class="btn-glass" style="margin-left: auto;">⟳ Reset View</button>
                </div>
                <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.1);">
                    <p style="font-size: 14px; color: var(--text2);">${product.description}</p>
                    <p style="font-size: 12px; color: var(--muted); margin-top: 8px;">${product.specs}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                        <span style="font-size: 28px; font-weight: 700; color: var(--navy);">R${product.price.toLocaleString()}</span>
                        <button onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}); this.closest('.modal-backdrop').remove();" class="btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const canvas = document.getElementById('viewerCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = product.img;
        let currentTint = null;
        
        function draw() {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            canvas.width = w; canvas.height = h;
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.scale(zoom, zoom);
            ctx.rotate((rotY * Math.PI / 180) * 0.3);
            
            // Draw 3D grid effect
            ctx.strokeStyle = 'rgba(147, 197, 253, 0.3)';
            ctx.lineWidth = 1;
            for (let i = -200; i <= 200; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i - rotY * 0.5, -150);
                ctx.lineTo(i + rotY * 0.5, 150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-150, i - rotX * 0.5);
                ctx.lineTo(150, i + rotX * 0.5);
                ctx.stroke();
            }
            
            // Draw product image with perspective
            const imgW = 160, imgH = 160;
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.save();
            ctx.transform(1, rotX * 0.008, rotY * 0.008, 1, -rotY * 0.5, -rotX * 0.5);
            ctx.drawImage(img, -imgW/2, -imgH/2, imgW, imgH);
            if (currentTint) {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = currentTint;
                ctx.fillRect(-imgW/2, -imgH/2, imgW, imgH);
                ctx.globalAlpha = 1;
            }
            ctx.restore();
            
            // Draw highlight
            ctx.beginPath();
            ctx.ellipse(-imgW/4 + rotY, -imgH/4 + rotX, 25, 25, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
            
            ctx.restore();
        }
        
        img.onload = draw;
        
        const container = document.getElementById('viewerContainer');
        container.onmousedown = (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; container.style.cursor = 'grabbing'; };
        window.onmousemove = (e) => {
            if (!isDragging) return;
            rotY += (e.clientX - startX) * 0.8;
            rotX += (e.clientY - startY) * 0.8;
            rotX = Math.min(30, Math.max(-30, rotX));
            startX = e.clientX; startY = e.clientY;
            draw();
        };
        window.onmouseup = () => { isDragging = false; container.style.cursor = 'grab'; };
        container.onwheel = (e) => { e.preventDefault(); zoom = Math.min(1.8, Math.max(0.5, zoom - e.deltaY * 0.005)); draw(); };
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => { currentTint = btn.dataset.color; draw(); };
        });
        document.getElementById('resetViewBtn').onclick = () => { rotX = 0; rotY = 0; zoom = 1; currentTint = null; draw(); };
        
        draw();
    }

        setTimeout(() => { const win = document.getElementById('chatMessages'); if (win) win.scrollTop = win.scrollHeight; }, 100);
    }

    function showProductDetail(product) {
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                    <h3 style="font-size: 24px;">${product.name}</h3>
                    <button class="btn-glass" onclick="this.closest('.modal-backdrop').remove()" style="padding: 6px 12px;">✕</button>
                </div>
                <img src="${product.img}" style="width: 100%; border-radius: 16px; margin-bottom: 16px;">
                <p style="color: var(--text2); line-height: 1.6;">${product.description}</p>
                <p style="font-size: 12px; color: var(--muted); margin-top: 12px;">${product.specs}</p>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <span style="font-size: 28px; font-weight: 700;">R${product.price.toLocaleString()}</span>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn-glass" onclick="open3DViewer(${JSON.stringify(product).replace(/"/g, '&quot;')}); this.closest('.modal-backdrop').remove();">⟳ 360° View</button>
                        <button class="btn-primary" onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}); this.closest('.modal-backdrop').remove();">Add to Cart</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }

    function showCartModal() {
        if (cart.length === 0) { showToast('Your cart is empty', 'info'); return; }
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Your Cart (${cart.length} items)</h3>
                    <button class="btn-glass" onclick="this.closest('.modal-backdrop').remove()">✕</button>
                </div>
                ${cart.map(item => `
                    <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee;">
                        <img src="${item.img}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
                        <div style="flex: 1;"><p><strong>${item.name}</strong></p><p>R${item.price.toLocaleString()}</p></div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <button class="btn-glass" style="padding: 4px 8px;" onclick="updateCartQty(${item.id}, -1); this.closest('.modal-backdrop').remove(); showCartModal();">-</button>
                            <span>${item.quantity}</span>
                            <button class="btn-glass" style="padding: 4px 8px;" onclick="updateCartQty(${item.id}, 1); this.closest('.modal-backdrop').remove(); showCartModal();">+</button>
                        </div>
                    </div>
                `).join('')}
                <div style="margin-top: 20px; padding-top: 16px; border-top: 2px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 700;">Total:</span>
                    <span style="font-size: 24px; font-weight: 700;">R${total.toLocaleString()}</span>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 16px;" onclick="this.closest('.modal-backdrop').remove(); checkout();">Proceed to Checkout</button>
                <button class="btn-glass" style="width: 100%; margin-top: 8px;" onclick="clearCart(); this.closest('.modal-backdrop').remove();">Clear Cart</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    function showOrdersModal() {
        const userOrders = orders.filter(o => o.customer.id === currentUser.id);
        if (userOrders.length === 0) { showToast('No orders yet', 'info'); return; }
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.innerHTML = `
            <div class="modal-content wide">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>My Orders</h3>
                    <button class="btn-glass" onclick="this.closest('.modal-backdrop').remove()">✕</button>
                </div>
                ${userOrders.map(order => `
                    <div class="glass-card" style="margin-bottom: 16px; padding: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;">
                            <div><strong>#${order.orderNumber}</strong><br><small>${new Date(order.createdAt).toLocaleString()}</small></div>
                            <span class="status-${order.status}" style="padding: 4px 12px; border-radius: 20px; font-size: 12px;">${order.status.replace('_', ' ').toUpperCase()}</span>
                        </div>
                        ${order.items.map(item => `<div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>${item.name} x${item.quantity}</span><span>R${(item.price * item.quantity).toLocaleString()}</span></div>`).join('')}
                        <div style="border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between; font-weight: 700;"><span>Total</span><span>R${order.total.toLocaleString()}</span></div>
                        <button class="btn-glass" style="margin-top: 12px; width: 100%;" onclick="trackOrderModal('${order.id}'); this.closest('.modal-backdrop').remove();">Track Order</button>
                    </div>
                `).join('')}
            </div>
        `;
        document.body.appendChild(modal);
    }

    function trackOrderModal(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3>Tracking #${order.orderNumber}</h3>
                    <button class="btn-glass" onclick="this.closest('.modal-backdrop').remove()">✕</button>
                </div>
                <div class="timeline-item" style="padding-left: 24px;">
                    ${order.updates.map(up => `
                        <div class="timeline-item">
                            <p style="font-weight: 600;">${up.message}</p>
                            <p style="font-size: 11px; color: var(--muted);">${new Date(up.timestamp).toLocaleString()}</p>
                        </div>
                    `).join('')}
                </div>
                ${order.tracking ? `
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
                        <p><strong>Carrier:</strong> ${order.tracking.carrier}</p>
                        <p><strong>Tracking #:</strong> ${order.tracking.trackingNumber}</p>
                        <p><strong>Est. Delivery:</strong> ${order.tracking.estimatedDelivery}</p>
                        ${order.tracking.history ? `
                            <div style="margin-top: 12px;"><strong>Delivery History:</strong></div>
                            ${order.tracking.history.map(h => `
                                <div style="font-size: 12px; padding: 6px 0;"><span>📍 ${h.location}</span><br><span style="color: var(--muted);">${h.status} - ${new Date(h.timestamp).toLocaleString()}</span></div>
                            `).join('')}
                        ` : ''}
                    </div>
                ` : ''}
            </div>
        `;
        document.body.appendChild(modal);
    }

    // ============ ADMIN DASHBOARD ============
    function renderAdmin() {
        const analytics = {
            totalOrders: orders.length,
            totalRevenue: orders.reduce((s, o) => s + o.total, 0),
            pending: orders.filter(o => o.status === 'pending').length,
            delivered: orders.filter(o => o.status === 'delivered').length,
            signups: signupEvents.length
        };
        
        const adminNotifs = notifications.filter(n => n.userId === 'admin_1');
        const unreadAdmin = adminNotifs.filter(n => !n.read).length;
        
        const html = `
            <div style="min-height: 100vh; background: #0f172a;">
                <div style="background: #1e293b; padding: 16px 24px; position: sticky; top: 0; z-index: 100;">
                    <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
                        <div><h2 style="color: white;">👑 CQC Admin Dashboard</h2><p style="color: #94a3b8; font-size: 12px;">Welcome, ${currentUser.name}</p></div>
                        <div style="display: flex; gap: 12px;">
                            <button class="btn-glass" onclick="renderApp()">🏠 Storefront</button>
                            <button class="btn-primary" onclick="logout()">Sign Out</button>
                        </div>
                    </div>
                </div>
                
                <div style="max-width: 1400px; margin: 0 auto; padding: 32px 24px;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;">
                        <div class="glass-card" style="padding: 20px; text-align: center;"><div style="font-size: 32px;">📦</div><div style="font-size: 28px; font-weight: 700;">${analytics.totalOrders}</div><div>Total Orders</div></div>
                        <div class="glass-card" style="padding: 20px; text-align: center;"><div style="font-size: 32px;">💰</div><div style="font-size: 28px; font-weight: 700;">R${analytics.totalRevenue.toLocaleString()}</div><div>Revenue</div></div>
                        <div class="glass-card" style="padding: 20px; text-align: center;"><div style="font-size: 32px;">⏳</div><div style="font-size: 28px; font-weight: 700;">${analytics.pending}</div><div>Pending Orders</div></div>
                        <div class="glass-card" style="padding: 20px; text-align: center;"><div style="font-size: 32px;">✅</div><div style="font-size: 28px; font-weight: 700;">${analytics.delivered}</div><div>Delivered</div></div>
                        <div class="glass-card" style="padding: 20px; text-align: center;"><div style="font-size: 32px;">🎉</div><div style="font-size: 28px; font-weight: 700;">${analytics.signups}</div><div>New Signups</div></div>
                    </div>
                    
                    <div class="glass-card" style="padding: 24px; margin-bottom: 32px;">
                        <h3 style="margin-bottom: 16px;">🎁 New Signups - Send Welcome Discounts</h3>
                        ${signupEvents.filter(e => !e.welcomeSent).length === 0 ? '<p style="color: var(--muted);">No new signups to process</p>' : 
                            signupEvents.filter(e => !e.welcomeSent).map(e => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee;">
                                    <div><strong>${e.userName}</strong><br><small>${e.userEmail}</small><br><small>Joined: ${new Date(e.timestamp).toLocaleString()}</small></div>
                                    <div><span class="pill" style="background: #fef3c7; padding: 4px 12px; border-radius: 20px;">Code: ${e.discountCode}</span></div>
                                    <button class="btn-primary" onclick="sendWelcomeDiscount('${e.userId}')">Send Welcome Discount →</button>
                                </div>
                            `).join('')
                        }
                    </div>
                    
                    <h3 style="margin-bottom: 16px;">📋 Orders (${orders.length})</h3>
                    ${orders.map((order, idx) => `
                        <div class="glass-card" style="padding: 20px; margin-bottom: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
                                <div><strong>#${order.orderNumber}</strong><br><small>${new Date(order.createdAt).toLocaleString()}</small><br><small>Customer: ${order.customer.name} (${order.customer.email})</small></div>
                                <span class="status-${order.status}" style="padding: 4px 12px; border-radius: 20px;">${order.status.replace('_', ' ').toUpperCase()}</span>
                                <div style="font-size: 24px; font-weight: 700;">R${order.total.toLocaleString()}</div>
                            </div>
                            <div style="margin-bottom: 12px;">${order.items.map(i => `<span style="display: inline-block; background: #f0f0f0; padding: 4px 8px; border-radius: 8px; margin: 4px;">${i.name} x${i.quantity}</span>`).join('')}</div>
                            <textarea id="updateMsg${idx}" class="input-modern" style="margin-bottom: 8px;" placeholder="Add update message..."></textarea>
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                ${order.status === 'pending' ? `<button class="btn-primary" onclick="approveOrder('${order.id}')">✅ Approve Order</button>` : ''}
                                <button class="btn-glass" onclick="updateOrderStatus('${order.id}', 'shipped', 'Your order has been shipped!')">🚚 Mark Shipped</button>
                                <button class="btn-glass" onclick="updateOrderStatus('${order.id}', 'out_for_delivery', 'Your order is out for delivery!')">🚛 Out for Delivery</button>
                                <button class="btn-glass" onclick="updateOrderStatus('${order.id}', 'delivered', 'Your order has been delivered!')">📦 Mark Delivered</button>
                                <button class="btn-glass" onclick="addOrderUpdate('${order.id}', document.getElementById('updateMsg${idx}').value)">📝 Add Update</button>
                            </div>
                            <div style="margin-top: 12px;">
                                <details><summary style="cursor: pointer; font-size: 12px;">📋 Activity Log</summary>
                                    ${order.updates.slice(-5).map(u => `<div style="font-size: 11px; padding: 4px 0; border-bottom: 1px solid #f0f0f0;">${u.message} - ${new Date(u.timestamp).toLocaleString()}</div>`).join('')}
                                </details>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    }

    function toggleNotifPanel() {
        const panel = document.getElementById('notifPanel');
        if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    window.toggleNotifPanel = toggleNotifPanel;
    window.markNotificationRead = markNotificationRead;
    window.sendWelcomeDiscount = sendWelcomeDiscount;
    window.approveOrder = approveOrder;
    window.updateOrderStatus = updateOrderStatus;
    window.addOrderUpdate = addOrderUpdate;
    window.showCartModal = showCartModal;
    window.showOrdersModal = showOrdersModal;
    window.showProductDetail = showProductDetail;
    window.trackOrderModal = trackOrderModal;
    window.sendChatMessage = sendChatMessage;
    window.toggleChatbot = toggleChatbot;
    window.login = login;
    window.logout = logout;
    window.addToCart = addToCart;
    window.updateCartQty = updateCartQty;
    window.clearCart = clearCart;
    window.checkout = checkout;
    window.open3DViewer = open3DViewer;
    window.currentCategory = currentCategory;
    window.searchQuery = searchQuery;
    
    renderApp();
</script>

</body>
</html>
