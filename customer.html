<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CQC Business Solutions — Premium Workspace Furniture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0A0F1C;
  --bg-card: rgba(255, 255, 255, 0.96);
  --primary: #1E3A8A;
  --primary-dark: #0F2B6D;
  --primary-glow: rgba(30, 58, 138, 0.25);
  --accent: #D97706;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --text-main: #111827;
  --text-muted: #6B7280;
  --border-light: rgba(0, 0, 0, 0.08);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
  --radius-md: 14px;
  --radius-lg: 20px;
}

body {
  font-family: 'Inter', sans-serif;
  background: #F9FAFB;
  color: var(--text-main);
  overflow-x: hidden;
}

/* Premium Glass Morphism */
.glass-panel {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: var(--shadow-sm);
}

/* Buttons & Interactive */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.85rem;
  padding: 0.6rem 1.4rem;
  border-radius: 40px;
  transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  cursor: pointer;
  border: none;
  letter-spacing: -0.2px;
}

.btn-primary {
  background: linear-gradient(105deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 12px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px -5px var(--primary-glow);
}

.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border-light);
  color: var(--text-main);
}
.btn-outline:hover {
  border-color: var(--primary);
  background: rgba(30, 58, 138, 0.05);
  transform: translateY(-1px);
}

.btn-icon {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 30px;
  background: white;
  border: 1px solid var(--border-light);
  color: var(--text-main);
  font-size: 1.1rem;
  transition: all 0.2s;
}
.btn-icon:hover {
  transform: scale(1.05);
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

/* Cards */
.product-card {
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.35s ease;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(30, 58, 138, 0.2);
}

/* Progress Bar Animation */
.progress-bar-fill {
  transition: width 0.6s cubic-bezier(0.22, 0.97, 0.36, 1.02);
}

/* Badge Pop (immediate animation) */
.badge-pop {
  animation: badgePop 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
}
@keyframes badgePop {
  0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
  70% { transform: scale(1.2) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 3D Viewer Canvas Container */
.viewer-3d {
  width: 100%;
  height: 380px;
  background: radial-gradient(circle at 30% 20%, #111827, #030712);
  border-radius: 24px;
  cursor: grab;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 20px 30px -10px rgba(0,0,0,0.3);
}
.viewer-3d:active {
  cursor: grabbing;
}

/* Live Notification Toast */
.live-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #1F2937;
  backdrop-filter: blur(12px);
  color: white;
  padding: 12px 24px;
  border-radius: 60px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 500;
  z-index: 1000;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Admin / Tracking Map */
.track-step {
  transition: all 0.3s ease;
}
.track-step.active .step-icon {
  background: var(--primary);
  box-shadow: 0 0 0 6px rgba(30,58,138,0.3);
  transform: scale(1.1);
}
.step-icon {
  transition: 0.2s;
}

/* Hover icons */
.icon-hover {
  transition: all 0.2s;
}
.icon-hover:hover {
  transform: scale(1.15);
  color: var(--primary);
}

/* Font Styling Professional */
h1, h2, h3, .font-serif {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
}
</style>
</head>
<body>

<div id="app-root"></div>

<script>
  // ---------- MOCK DATA & STORAGE ----------
  let products = [
    { id: 1, name: "Aeron Executive Mesh", category: "Chairs", price: 1899, oldPrice: 2499, image: "https://images.unsplash.com/photo-1580480055273-228ff5388ef8?w=400&h=300&fit=crop", rating: 4.8, inStock: true, desc: "Ergonomic mesh back, adjustable lumbar support." },
    { id: 2, name: "Summit Standing Desk", category: "Desks", price: 4299, oldPrice: null, image: "https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&h=300&fit=crop", rating: 4.9, inStock: true, desc: "Electric height adjustable, memory presets." },
    { id: 3, name: "Orbit Lounge Chair", category: "Lounge", price: 3299, oldPrice: 3999, image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=300&fit=crop", rating: 4.7, inStock: true, desc: "Premium fabric, swivel base, luxurious comfort." },
    { id: 4, name: "Metro Bookshelf", category: "Storage", price: 1299, oldPrice: null, image: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=400&h=300&fit=crop", rating: 4.5, inStock: true, desc: "Industrial style, solid wood shelves." },
    { id: 5, name: "Vertex Conference Table", category: "Tables", price: 5899, oldPrice: 6999, image: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=300&fit=crop", rating: 4.9, inStock: true, desc: "Large meeting table, cable management." }
  ];
  
  let orders = [];
  let users = [{ email: "admin@cqc.com", password: "admin123", name: "Admin User", role: "admin" },
               { email: "customer@test.com", password: "123456", name: "John Doe", role: "customer" }];
  let currentUser = null;
  let cart = [];
  let notifications = [];  // { id, userId, title, message, type, read, timestamp }
  
  // Helper functions
  const saveToLocal = () => {
    localStorage.setItem("cqc_products", JSON.stringify(products));
    localStorage.setItem("cqc_orders", JSON.stringify(orders));
    localStorage.setItem("cqc_users", JSON.stringify(users));
    localStorage.setItem("cqc_notifications", JSON.stringify(notifications));
    if(currentUser) localStorage.setItem("cqc_currentUser", JSON.stringify(currentUser));
    localStorage.setItem("cqc_cart", JSON.stringify(cart));
  };
  
  const loadFromLocal = () => {
    if(localStorage.getItem("cqc_products")) products = JSON.parse(localStorage.getItem("cqc_products"));
    if(localStorage.getItem("cqc_orders")) orders = JSON.parse(localStorage.getItem("cqc_orders"));
    if(localStorage.getItem("cqc_users")) users = JSON.parse(localStorage.getItem("cqc_users"));
    if(localStorage.getItem("cqc_notifications")) notifications = JSON.parse(localStorage.getItem("cqc_notifications"));
    if(localStorage.getItem("cqc_currentUser")) currentUser = JSON.parse(localStorage.getItem("cqc_currentUser"));
    if(localStorage.getItem("cqc_cart")) cart = JSON.parse(localStorage.getItem("cqc_cart"));
  };
  loadFromLocal();
  
  // Notification & Badge System
  function addNotification(userEmail, title, message, type = "info") {
    const newNotif = { id: Date.now(), userId: userEmail, title, message, type, read: false, timestamp: new Date().toISOString() };
    notifications.unshift(newNotif);
    saveToLocal();
    // Trigger badge popup immediately
    showLiveToast(message, type);
    updateNotificationBadge(userEmail);
    return newNotif;
  }
  
  function showLiveToast(message, type) {
    const toastDiv = document.createElement('div');
    toastDiv.className = 'live-toast';
    const icon = type === 'success' ? '✅' : type === 'warning' ? '⚠️' : '🔔';
    toastDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-bell'}"></i> ${message}`;
    document.body.appendChild(toastDiv);
    setTimeout(() => toastDiv.remove(), 3800);
  }
  
  function updateNotificationBadge(email) {
    const unreadCount = notifications.filter(n => n.userId === email && !n.read).length;
    const badgeSpan = document.getElementById('global-notif-badge');
    if(badgeSpan) {
      if(unreadCount > 0) {
        badgeSpan.innerText = unreadCount;
        badgeSpan.style.display = 'flex';
        badgeSpan.classList.add('badge-pop');
        setTimeout(() => badgeSpan.classList.remove('badge-pop'), 400);
      } else badgeSpan.style.display = 'none';
    }
  }
  
  // Admin approve order -> progress updates instantly on frontend
  function approveOrder(orderId) {
    const order = orders.find(o => o.id === orderId);
    if(order && order.status === "pending") {
      order.status = "approved";
      order.progress = 25;
      order.timeline.push({ step: "Approved", date: new Date().toISOString(), message: "Admin approved the order." });
      addNotification(order.customerEmail, "Order Approved", `Your order #${orderId} has been approved and is now in progress.`, "success");
      saveToLocal();
      renderCurrentView();
    }
  }
  
  function updateOrderProgress(orderId, newStatus, progressPercent) {
    const order = orders.find(o => o.id === orderId);
    if(order) {
      order.status = newStatus;
      order.progress = progressPercent;
      order.timeline.push({ step: newStatus, date: new Date().toISOString(), message: `Order is now: ${newStatus}` });
      addNotification(order.customerEmail, `Order Update: ${newStatus}`, `Your order #${orderId} has moved to ${newStatus}.`, "info");
      saveToLocal();
      renderCurrentView();
    }
  }
  
  // 3D viewer (Three.js powered 360 degrees)
  function launch3DViewer(product) {
    const modalDiv = document.createElement('div');
    modalDiv.style.position = 'fixed';
    modalDiv.style.top = '0'; modalDiv.style.left = '0'; modalDiv.style.width = '100%'; modalDiv.style.height = '100%';
    modalDiv.style.backgroundColor = 'rgba(0,0,0,0.8)';
    modalDiv.style.backdropFilter = 'blur(12px)';
    modalDiv.style.zIndex = '2000';
    modalDiv.style.display = 'flex';
    modalDiv.style.alignItems = 'center';
    modalDiv.style.justifyContent = 'center';
    modalDiv.innerHTML = `
      <div style="background: #111; border-radius: 32px; width: 85%; max-width: 900px; padding: 20px; position: relative;">
        <button id="close3d" style="position: absolute; right: 20px; top: 20px; background: white; border: none; border-radius: 40px; width: 40px; height: 40px; cursor: pointer; font-weight: bold;">✕</button>
        <h3 style="color: white; margin-bottom: 12px;">${product.name} — 360° View</h3>
        <div id="three-canvas" style="width:100%; height: 420px; border-radius: 24px; overflow: hidden;"></div>
        <p style="color: #aaa; font-size: 12px; margin-top: 12px; text-align: center;">Drag to rotate • Scroll to zoom</p>
      </div>
    `;
    document.body.appendChild(modalDiv);
    
    // Three.js script injection
    const scriptThree = document.createElement('script');
    scriptThree.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
    scriptThree.onload = () => {
      const container = document.getElementById('three-canvas');
      const width = container.clientWidth, height = container.clientHeight;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050b1a);
      const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
      camera.position.set(3, 2, 5);
      camera.lookAt(0,0,0);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(width, height);
      container.appendChild(renderer.domElement);
      
      // Lighting
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(2,5,3);
      scene.add(dirLight);
      const backLight = new THREE.PointLight(0x4466cc, 0.4);
      backLight.position.set(-1,1,-3);
      scene.add(backLight);
      
      // Create a polished 3D shape (modern furniture representation)
      const geometry = new THREE.BoxGeometry(1.6, 1.2, 1.6);
      const material = new THREE.MeshStandardMaterial({ color: 0x3b6e9e, metalness: 0.7, roughness: 0.3, emissive: 0x112233 });
      const mainCube = new THREE.Mesh(geometry, material);
      mainCube.castShadow = true;
      mainCube.receiveShadow = false;
      scene.add(mainCube);
      
      const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.5, 8);
      const legMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.8 });
      const positions = [[-0.7, -0.85, -0.7], [0.7, -0.85, -0.7], [-0.7, -0.85, 0.7], [0.7, -0.85, 0.7]];
      positions.forEach(pos => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(pos[0], pos[1], pos[2]);
        scene.add(leg);
      });
      
      const backGeo = new THREE.BoxGeometry(1.6, 0.8, 0.1);
      const backMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
      const backPanel = new THREE.Mesh(backGeo, backMat);
      backPanel.position.set(0, 0.2, -0.85);
      scene.add(backPanel);
      
      const textureLoader = new THREE.TextureLoader();
      if(product.image) {
        textureLoader.load(product.image, (tex) => {
          const seatMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.4, metalness: 0.1 });
          const seatGeo = new THREE.BoxGeometry(1.5, 0.1, 1.5);
          const seat = new THREE.Mesh(seatGeo, seatMat);
          seat.position.set(0, -0.4, 0);
          scene.add(seat);
        });
      }
      
      // Controls: manual orbit
      let isDragging = false, lastX = 0, lastY = 0;
      let rotateY = 0, rotateX = 0;
      const onMouseMove = (e) => {
        if(!isDragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        rotateY += dx * 0.008;
        rotateX += dy * 0.005;
        rotateX = Math.min(0.8, Math.max(-0.8, rotateX));
        lastX = e.clientX;
        lastY = e.clientY;
      };
      const onMouseDown = (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
      const onMouseUp = () => { isDragging = false; };
      renderer.domElement.addEventListener('mousedown', onMouseDown);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      
      function animate() {
        requestAnimationFrame(animate);
        mainCube.rotation.y = rotateY;
        mainCube.rotation.x = rotateX;
        backPanel.rotation.y = rotateY;
        backPanel.rotation.x = rotateX;
        camera.lookAt(0,0,0);
        renderer.render(scene, camera);
      }
      animate();
    };
    document.body.appendChild(scriptThree);
    document.getElementById('close3d').onclick = () => modalDiv.remove();
  }
  
  // Render Cart / Checkout
  function addToCart(productId) {
    if(!currentUser) { showLiveToast("Please login first", "warning"); renderLoginModal(); return; }
    const prod = products.find(p => p.id === productId);
    if(prod) {
      const existing = cart.find(i => i.id === productId);
      if(existing) existing.qty++;
      else cart.push({ ...prod, qty: 1 });
      saveToLocal();
      showLiveToast(`${prod.name} added to cart`, "success");
      renderCurrentView();
    }
  }
  
  function placeOrder() {
    if(cart.length === 0) return;
    const newOrder = {
      id: Date.now(),
      customerEmail: currentUser.email,
      customerName: currentUser.name,
      items: [...cart],
      total: cart.reduce((sum, i) => sum + (i.price * i.qty), 0),
      status: "pending",
      progress: 0,
      timeline: [{ step: "Placed", date: new Date().toISOString(), message: "Order placed, waiting for admin approval." }],
      createdAt: new Date().toISOString()
    };
    orders.unshift(newOrder);
    cart = [];
    saveToLocal();
    addNotification(currentUser.email, "Order Placed", `Order #${newOrder.id} received. Awaiting approval.`, "success");
    addNotification("admin@cqc.com", "New Order", `Order #${newOrder.id} from ${currentUser.name}.`, "info");
    renderCurrentView();
    showLiveToast("Order placed! Admin will approve soon.", "success");
  }
  
  // Render Functions (Main UI)
  function renderHome() {
    const app = document.getElementById('app-root');
    const unreadCount = currentUser ? notifications.filter(n => n.userId === currentUser.email && !n.read).length : 0;
    app.innerHTML = `
      <div style="max-width: 1400px; margin: 0 auto; padding: 20px 24px;">
        <nav style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 12px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-couch" style="font-size: 28px; color: var(--primary);"></i>
            <h1 style="font-size: 1.6rem;">CQC Business Solutions</h1>
          </div>
          <div style="display: flex; gap: 12px; align-items: center;">
            ${currentUser ? `
              <div style="position: relative;">
                <button id="notifIconBtn" class="btn btn-icon"><i class="fas fa-bell"></i><span id="global-notif-badge" style="position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 30px; padding: 2px 6px; font-size: 10px; display: ${unreadCount ? 'flex' : 'none'};">${unreadCount || ''}</span></button>
              </div>
              <span style="font-weight: 500;"><i class="fas fa-user-circle"></i> ${currentUser.name}</span>
              <button class="btn btn-outline" id="cartBtn"><i class="fas fa-shopping-cart"></i> Cart (${cart.reduce((a,b)=>a+b.qty,0)})</button>
              ${currentUser.role === 'admin' ? '<button class="btn btn-primary" id="adminPanelBtn"><i class="fas fa-chalkboard-user"></i> Admin</button>' : ''}
              <button class="btn btn-outline" id="logoutBtn">Logout</button>
            ` : `
              <button class="btn btn-primary" id="loginBtn"><i class="fas fa-key"></i> Login</button>
              <button class="btn btn-outline" id="signupBtn">Sign Up</button>
            `}
          </div>
        </nav>
        
        <div class="glass-panel" style="padding: 32px; border-radius: var(--radius-lg); margin-bottom: 40px; text-align: center;">
          <h2 style="font-size: 2.2rem;">Premium Workspace <span style="color: var(--primary);">Essentials</span></h2>
          <p style="color: var(--text-muted); margin: 12px 0;">Ergonomic designs • Free shipping • 3-year warranty</p>
          <div style="display: flex; gap: 12px; justify-content: center;">
            <button class="btn btn-primary" id="exploreBtn"><i class="fas fa-arrow-right"></i> Explore Collection</button>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px;">
          ${products.map(p => `
            <div class="product-card" data-id="${p.id}">
              <img src="${p.image}" style="width: 100%; height: 200px; object-fit: cover;" />
              <div style="padding: 18px;">
                <div style="display: flex; justify-content: space-between;"><h3>${p.name}</h3><span class="tag" style="background:#FEF3C7; padding:4px 8px; border-radius:40px;">⭐ ${p.rating}</span></div>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 8px 0;">${p.desc}</p>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                  <div><strong style="font-size: 1.3rem;">R${p.price.toLocaleString()}</strong> ${p.oldPrice ? `<span style="text-decoration: line-through; font-size: 0.8rem;">R${p.oldPrice}</span>` : ''}</div>
                  <div style="display: flex; gap: 6px;">
                    <button class="btn-icon icon-hover view3d-btn" data-id="${p.id}" title="360° 3D View"><i class="fas fa-cube"></i></button>
                    <button class="btn btn-primary add-cart-btn" data-id="${p.id}" style="padding: 8px 16px;"><i class="fas fa-cart-plus"></i> Add</button>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    
    // Attach event listeners
    document.querySelectorAll('.add-cart-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); addToCart(parseInt(btn.dataset.id)); });
    });
    document.querySelectorAll('.view3d-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); const prod = products.find(p => p.id === parseInt(btn.dataset.id)); if(prod) launch3DViewer(prod); });
    });
    if(currentUser) {
      document.getElementById('cartBtn')?.addEventListener('click', () => renderCartModal());
      document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; cart = []; saveToLocal(); renderHome(); showLiveToast("Logged out", "info"); });
      if(document.getElementById('adminPanelBtn')) document.getElementById('adminPanelBtn').addEventListener('click', () => renderAdminDashboard());
      document.getElementById('notifIconBtn')?.addEventListener('click', () => renderNotificationPanel());
    } else {
      document.getElementById('loginBtn')?.addEventListener('click', () => renderLoginModal());
      document.getElementById('signupBtn')?.addEventListener('click', () => renderSignupModal());
    }
    document.getElementById('exploreBtn')?.addEventListener('click', () => document.querySelector('.product-card')?.scrollIntoView({ behavior: 'smooth' }));
  }
  
  function renderCartModal() {
    if(!cart.length) { showLiveToast("Cart is empty", "warning"); return; }
    const total = cart.reduce((s,i)=> s + i.price * i.qty,0);
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:1001;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:white; border-radius:32px; width:500px; max-width:90%; padding:24px;">
        <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
        ${cart.map(item => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee;"><span>${item.name} x${item.qty}</span><span>R${(item.price*item.qty).toLocaleString()}</span></div>`).join('')}
        <div style="font-weight:bold; margin: 16px 0;">Total: R${total.toLocaleString()}</div>
        <div style="display:flex; gap:12px; justify-content:flex-end;">
          <button id="closeCartModal" class="btn btn-outline">Close</button>
          <button id="checkoutBtn" class="btn btn-primary">Checkout</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('closeCartModal').onclick = () => modal.remove();
    document.getElementById('checkoutBtn').onclick = () => { modal.remove(); placeOrder(); };
  }
  
  function renderAdminDashboard() {
    if(!currentUser || currentUser.role !== 'admin') return;
    const pendingOrders = orders.filter(o => o.status === 'pending');
    const inProgressOrders = orders.filter(o => o.status === 'approved' || o.status === 'processing');
    const app = document.getElementById('app-root');
    app.innerHTML = `
      <div style="max-width:1400px; margin:20px auto; padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2><i class="fas fa-gavel"></i> Admin Dashboard</h2><button id="backToStoreBtn" class="btn btn-outline"><i class="fas fa-store"></i> Back to Store</button></div>
        <div style="margin-top: 32px;">
          <h3>Pending Orders (Approve to update progress bar instantly)</h3>
          ${pendingOrders.map(order => `
            <div style="background:white; border-radius:24px; padding:20px; margin-bottom:18px; box-shadow:var(--shadow-sm);">
              <div><strong>Order #${order.id}</strong> | ${order.customerName} | Total: R${order.total}</div>
              <div style="margin:10px 0;"><div style="background:#e2e8f0; border-radius:20px; height:8px;"><div style="width:${order.progress}%; background: var(--primary); border-radius:20px; height:8px;" class="progress-bar-fill"></div></div></div>
              <button class="btn btn-primary approve-btn" data-id="${order.id}"><i class="fas fa-check-circle"></i> Approve & Start Progress</button>
              <button class="btn btn-outline mark-delivered-btn" data-id="${order.id}" data-status="delivered" data-progress="100">Mark Delivered</button>
            </div>
          `).join('')}
          <h3>Active / In Progress</h3>
          ${inProgressOrders.map(order => `
            <div style="background:#f8fafc; border-radius:24px; padding:20px; margin-bottom:12px;">
              <div><strong>#${order.id}</strong> Status: ${order.status} | Progress: ${order.progress}%</div>
              <div style="margin:10px 0;"><div style="background:#e2e8f0; border-radius:20px; height:8px;"><div style="width:${order.progress}%; background: #10b981; border-radius:20px; height:8px;"></div></div></div>
              <button class="btn btn-outline update-progress" data-id="${order.id}" data-progress="50" data-status="processing">Mark as Processing (50%)</button>
              <button class="btn btn-outline update-progress" data-id="${order.id}" data-progress="100" data-status="delivered">Delivered (100%)</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.querySelectorAll('.approve-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { approveOrder(parseInt(btn.dataset.id)); renderAdminDashboard(); });
    });
    document.querySelectorAll('.mark-delivered-btn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderProgress(parseInt(btn.dataset.id), "delivered", 100); renderAdminDashboard(); });
    });
    document.querySelectorAll('.update-progress').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderProgress(parseInt(btn.dataset.id), btn.dataset.status, parseInt(btn.dataset.progress)); renderAdminDashboard(); });
    });
    document.getElementById('backToStoreBtn').onclick = () => renderHome();
  }
  
  function renderNotificationPanel() {
    const userNotifs = notifications.filter(n => n.userId === currentUser.email);
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:white; border-radius:32px; width:460px; max-width:90%; padding:20px;">
        <h3><i class="fas fa-bell"></i> Notifications</h3>
        <div style="max-height:400px; overflow-y:auto;">
          ${userNotifs.length ? userNotifs.map(n => `<div style="border-bottom:1px solid #eee; padding:12px; ${!n.read ? 'background:#f0f9ff' : ''}"><strong>${n.title}</strong><p>${n.message}</p><small>${new Date(n.timestamp).toLocaleString()}</small></div>`).join('') : '<p>No notifications</p>'}
        </div>
        <button id="closeNotifPanel" class="btn btn-outline" style="margin-top:12px;">Close</button>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('closeNotifPanel').onclick = () => modal.remove();
    // Mark all as read after viewing
    notifications.filter(n => n.userId === currentUser.email && !n.read).forEach(n => n.read = true);
    saveToLocal();
    updateNotificationBadge(currentUser.email);
  }
  
  function renderLoginModal() {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:white; border-radius:28px; width:380px; padding:28px;">
        <h3>Sign in</h3>
        <input id="loginEmail" placeholder="Email" class="btn-outline" style="width:100%; padding:12px; margin:12px 0; border-radius:60px; border:1px solid #ddd;"><br>
        <input id="loginPass" type="password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border-radius:60px; border:1px solid #ddd;">
        <button id="submitLogin" class="btn btn-primary" style="width:100%">Login</button>
        <p style="margin-top:12px;">Demo: admin@cqc.com / admin123 | customer@test.com / 123456</p>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('submitLogin').onclick = () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      const user = users.find(u => u.email === email && u.password === pass);
      if(user) {
        currentUser = user;
        saveToLocal();
        modal.remove();
        renderHome();
        showLiveToast(`Welcome back, ${user.name}!`, "success");
      } else { alert("Invalid credentials"); }
    };
  }
  function renderSignupModal() {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:white; border-radius:28px; width:380px; padding:28px;">
        <h3>Create Account</h3>
        <input id="signName" placeholder="Full Name" style="width:100%; padding:12px; margin:8px 0; border-radius:60px; border:1px solid #ddd;">
        <input id="signEmail" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; border-radius:60px; border:1px solid #ddd;">
        <input id="signPass" type="password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border-radius:60px; border:1px solid #ddd;">
        <button id="doSignup" class="btn btn-primary" style="width:100%">Register</button>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('doSignup').onclick = () => {
      const name = document.getElementById('signName').value;
      const email = document.getElementById('signEmail').value;
      const pass = document.getElementById('signPass').value;
      if(!name || !email || !pass) return;
      const existing = users.find(u => u.email === email);
      if(existing) alert("User already exists");
      else {
        const newUser = { email, password: pass, name, role: "customer" };
        users.push(newUser);
        currentUser = newUser;
        saveToLocal();
        modal.remove();
        renderHome();
        addNotification(email, "Welcome to CQC!", "Thanks for signing up! Enjoy premium furniture.", "success");
        showLiveToast("Account created! Welcome!", "success");
      }
    };
  }
  
  function renderCurrentView() {
    if(currentUser && currentUser.role === 'admin') renderAdminDashboard();
    else renderHome();
  }
  
  // Entry
  renderHome();
</script>
</body>
</html>
