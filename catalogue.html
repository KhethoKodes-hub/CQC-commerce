<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CQC Business Solutions — Premium Workspace Furniture</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════════════════
   ROOT — keeps all original JS variable names intact
   while adding new luxury design tokens
══════════════════════════════════════════════════════ */
:root {
  /* Original tokens — DO NOT REMOVE (used by JS) */
  --N950:#03060f;--N900:#060e1f;--N800:#0a1628;--N700:#0f2040;--N600:#162a5a;
  --B700:#0d3fd9;--B600:#1447e6;--B500:#2560f5;--B400:#4d7cff;--B300:#7ea5ff;
  --B200:#adc5ff;--B100:#d9e6ff;--B50:#eff4ff;
  --WH:#fff;--OFF:#fdfaf6;--OFF2:#f5f0e8;--OFF3:#ede8df;
  --T1:#060e1f;--T2:#1a2d5a;--T3:#5c6b8a;--T4:#94a3b8;
  --G:#059669;--A:#d97706;--R:#dc2626;--V:#7c3aed;
  --bd:rgba(249,115,22,0.12);--bd2:rgba(249,115,22,0.24);
  --s1:0 1px 3px rgba(11,8,5,.07),0 4px 12px rgba(11,8,5,.05);
  --s2:0 4px 20px rgba(11,8,5,.09),0 1px 4px rgba(11,8,5,.05);
  --s3:0 12px 44px rgba(11,8,5,.14),0 2px 8px rgba(11,8,5,.06);
  --sB:0 8px 28px rgba(249,115,22,.35);
  --r:16px;--rs:10px;--rl:22px;--rx:28px;
 
  /* New luxury tokens */
  --org:#f97316;
  --org-d:#ea580c;
  --sky:#38bdf8;
  --ink:#0b0805;
  --paper:#fdfaf6;
  --warm:#fff7ee;
  --serif:'Cormorant Garamond',serif;
  --display:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
}
 
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  cursor:none;
}
 
/* NEW — fixed cursor, no mix-blend-mode */
#cqc-cursor {
  position: fixed; top: 0; left: 0;
  width: 10px; height: 10px;
  background: var(--org);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: width .28s cubic-bezier(.22,1,.36,1),
              height .28s cubic-bezier(.22,1,.36,1),
              background .28s, border .28s, opacity .2s;
  box-shadow: 0 0 0 1.5px rgba(249,115,22,.3);
  /* NO mix-blend-mode — that was causing it to vanish */
}
#cqc-cursor.big {
  width: 44px; height: 44px;
  background: rgba(249,115,22,.12);
  border: 1.5px solid var(--org);
  box-shadow: 0 0 0 1px rgba(249,115,22,.2);
}
#cqc-cursor.click {
  transform: translate(-50%, -50%) scale(.7);
}
 
/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--warm);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--org),var(--sky));border-radius:99px;}
 
/* ══════════════════════════════════════════════════════
   BACKGROUND — warm editorial paper + radial orbs
══════════════════════════════════════════════════════ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(148deg,#fdfaf6 0%,#faf3e8 30%,#f5f0f8 60%,#fdfaf6 100%);
}
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;animation:orbFloat 26s ease-in-out infinite;}
.o1{width:700px;height:700px;top:-260px;left:-180px;background:radial-gradient(circle,rgba(249,115,22,.12),transparent 70%);}
.o2{width:600px;height:600px;bottom:-220px;right:-130px;background:radial-gradient(circle,rgba(56,189,248,.10),transparent 70%);animation-delay:-13s;}
.o3{width:450px;height:450px;top:42%;left:48%;background:radial-gradient(circle,rgba(249,115,22,.07),transparent 70%);animation-delay:-7s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}33%{transform:translate(24px,-34px);}66%{transform:translate(-18px,22px);}}
 
/* ══════════════════════════════════════════════════════
   GLASS LAYERS
══════════════════════════════════════════════════════ */
.gl {background:rgba(255,255,255,.68);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,.85);box-shadow:var(--s1);}
.glm{background:rgba(255,255,255,.80);backdrop-filter:blur(26px) saturate(175%);-webkit-backdrop-filter:blur(26px) saturate(175%);border:1px solid rgba(255,255,255,.92);box-shadow:var(--s2);}
.gls{background:rgba(255,255,255,.93);backdrop-filter:blur(34px) saturate(200%);-webkit-backdrop-filter:blur(34px) saturate(200%);border:1px solid rgba(255,255,255,.98);box-shadow:var(--s3);}
 
/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
.hdr-wrap{
  position:sticky;top:0;z-index:500;
  background:rgba(253,250,246,.88);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border-bottom:1px solid rgba(249,115,22,.1);
  box-shadow:0 1px 0 rgba(255,255,255,.96),0 2px 20px rgba(11,8,5,.06);
}
.hdr{max-width:1440px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer;user-select:none;}
.logo-box{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--ink),var(--org));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:11px;color:white;
  letter-spacing:-.3px;
  box-shadow:0 4px 16px rgba(249,115,22,.35),0 0 0 1px rgba(255,255,255,.12) inset;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.logo:hover .logo-box{transform:rotate(-6deg) scale(1.08);}
.logo-name{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;font-style:italic;}
.logo-tag{font-family:var(--display);font-size:.6rem;font-weight:600;color:var(--T3);letter-spacing:.18em;text-transform:uppercase;margin-top:-1px;}
.nav{display:flex;gap:2px;}
.nav a{
  font-family:var(--display);color:var(--T3);text-decoration:none;
  font-size:.72rem;font-weight:700;
  padding:7px 14px;border-radius:8px;
  transition:all .2s;cursor:pointer;
  letter-spacing:.06em;text-transform:uppercase;
  position:relative;
}
.nav a::after{content:'';position:absolute;bottom:-2px;left:14px;right:14px;height:1.5px;background:var(--org);transform:scaleX(0);transition:transform .3s;}
.nav a:hover{color:var(--ink);background:rgba(249,115,22,.06);}
.nav a:hover::after{transform:scaleX(1);}
.hdr-r{display:flex;gap:8px;align-items:center;}
 
/* ══════════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--display);
  font-size:.72rem;font-weight:700;
  padding:9px 20px;border-radius:var(--rs);
  cursor:pointer;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  border:none;white-space:nowrap;
  letter-spacing:.05em;text-transform:uppercase;
  position:relative;overflow:hidden;
}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;}
 
/* Primary — orange */
.bp{background:linear-gradient(135deg,var(--org),var(--org-d));color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.32),0 1px 0 rgba(255,255,255,.14) inset;}
.bp::before{background:linear-gradient(135deg,#fb923c,var(--org));}
.bp:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 26px rgba(249,115,22,.45);}
.bp:hover::before{opacity:1;}
.bp:active{transform:translateY(0) scale(1);}
 
/* White */
.bw{background:#fff;color:var(--ink);border:1.5px solid rgba(249,115,22,.2);box-shadow:var(--s1);}
.bw:hover{transform:translateY(-2px);box-shadow:var(--s2);border-color:rgba(249,115,22,.4);}
 
/* Glass */
.bg{background:rgba(255,255,255,.78);color:var(--ink);border:1.5px solid rgba(249,115,22,.12);backdrop-filter:blur(8px);box-shadow:var(--s1);}
.bg:hover{background:#fff;border-color:rgba(249,115,22,.3);transform:translateY(-1px);box-shadow:var(--s2);}
 
/* Dark / ink */
.bn{background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(11,8,5,.22);}
.bn:hover{transform:translateY(-2px);background:var(--org);box-shadow:0 8px 24px rgba(249,115,22,.4);}
 
/* Danger */
.bd{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 14px rgba(220,38,38,.25);}
.bd:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(220,38,38,.36);}
 
/* WhatsApp */
.bwa{background:#25D366;color:#fff;box-shadow:0 4px 16px rgba(37,211,102,.28);}
.bwa:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.40);}
 
/* Sizes */
.bsm{padding:7px 14px;font-size:.66rem;border-radius:8px;}
.blg{padding:13px 30px;font-size:.78rem;border-radius:12px;}
.bxl{padding:16px 38px;font-size:.82rem;border-radius:14px;}
 
/* Icon button */
.bic{width:36px;height:36px;padding:0;background:rgba(255,255,255,.84);border:1.5px solid rgba(249,115,22,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;color:var(--ink);font-size:15px;box-shadow:var(--s1);}
.bic:hover{background:#fff;border-color:rgba(249,115,22,.4);box-shadow:var(--s2);transform:scale(1.06);}
 
/* ══════════════════════════════════════════════════════
   TAGS & STATUS BADGES
══════════════════════════════════════════════════════ */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-family:var(--display);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.tb{background:rgba(20,71,230,.08);color:#1447e6;border:1px solid rgba(20,71,230,.18);}
.tg{background:rgba(5,150,105,.08);color:#059669;border:1px solid rgba(5,150,105,.20);}
.ta{background:rgba(217,119,6,.08);color:#d97706;border:1px solid rgba(217,119,6,.20);}
.tr{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid rgba(220,38,38,.18);}
.tv{background:rgba(124,58,237,.08);color:#7c3aed;border:1px solid rgba(124,58,237,.18);}
.ts{background:linear-gradient(135deg,#ef4444,var(--org));color:#fff;border:none;box-shadow:0 2px 8px rgba(239,68,68,.26);}
.tn{background:linear-gradient(135deg,var(--org),var(--org-d));color:#fff;border:none;box-shadow:0 2px 8px rgba(249,115,22,.26);}
 
.sb{display:inline-block;padding:3px 12px;border-radius:99px;font-family:var(--display);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.sp{background:rgba(217,119,6,.10);color:#d97706;border:1px solid rgba(217,119,6,.22);}
.sa{background:rgba(20,71,230,.09);color:#1447e6;border:1px solid rgba(20,71,230,.20);}
.si{background:rgba(124,58,237,.09);color:#7c3aed;border:1px solid rgba(124,58,237,.20);}
.ss{background:rgba(5,150,105,.09);color:#059669;border:1px solid rgba(5,150,105,.20);}
.sd{background:rgba(5,150,105,.12);color:#047857;border:1px solid rgba(5,150,105,.24);}
.sc{background:rgba(5,150,105,.12);color:#047857;border:1px solid rgba(5,150,105,.24);}
 
/* Notification dot */
.nd{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:99px;background:linear-gradient(135deg,#ef4444,var(--org));color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;animation:ndp 2s ease-out infinite;padding:0 4px;}
@keyframes ndp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{box-shadow:0 0 0 7px rgba(239,68,68,0);}}
.nd-pop{animation:ndpop .4s cubic-bezier(.22,1,.36,1);}
@keyframes ndpop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
 
/* ══════════════════════════════════════════════════════
   INPUTS
══════════════════════════════════════════════════════ */
.inp{background:#fff;border:1.5px solid rgba(249,115,22,.15);border-radius:var(--rs);padding:10px 14px;font-family:var(--body);font-size:.84rem;color:var(--ink);outline:none;transition:all .25s;width:100%;box-shadow:var(--s1);font-weight:500;}
.inp::placeholder{color:var(--T4);font-weight:400;}
.inp:focus{border-color:rgba(249,115,22,.5);box-shadow:0 0 0 4px rgba(249,115,22,.1),var(--s1);}
.inp-lg{padding:13px 18px;font-size:.9rem;border-radius:12px;}
.lbl{font-family:var(--display);font-size:.62rem;font-weight:700;color:var(--T3);letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:5px;}
textarea.inp{resize:none;}
.iw{position:relative;}
.iw .inp{padding-left:42px;}
.iic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.38;}
 
/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(253,250,246,.97);backdrop-filter:blur(24px);border-radius:14px;padding:13px 22px;z-index:9999;font-family:var(--body);font-size:.82rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(11,8,5,.15),0 1px 0 rgba(255,255,255,.98) inset;animation:tin .35s cubic-bezier(.22,1,.36,1) both;white-space:nowrap;border:1.5px solid rgba(249,115,22,.2);min-width:260px;justify-content:center;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(.95);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
.tst{font-size:17px;}
.toast.success{border-color:rgba(5,150,105,.28);}
.toast.error{border-color:rgba(220,38,38,.22);}
.toast.info{border-color:rgba(249,115,22,.2);}
.toast.warn{border-color:rgba(217,119,6,.22);}
 
/* ══════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════ */
.mbg{position:fixed;inset:0;z-index:800;background:rgba(11,8,5,.35);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:20px;animation:mbin .2s ease;}
@keyframes mbin{from{opacity:0;}to{opacity:1;}}
.mbox{background:rgba(253,250,246,.97);backdrop-filter:blur(40px) saturate(200%);border:1px solid rgba(249,115,22,.12);border-radius:var(--rx);width:90%;max-width:540px;padding:32px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(11,8,5,.18),0 1px 0 rgba(255,255,255,.99) inset;animation:min .38s cubic-bezier(.22,1,.36,1);}
.mbox.wd{max-width:820px;}
.mbox.xl{max-width:1020px;}
@keyframes min{from{opacity:0;transform:scale(.95) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:22px;}
.mc{width:32px;height:32px;border-radius:8px;background:rgba(249,115,22,.06);border:1.5px solid rgba(249,115,22,.18);color:var(--T3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
.mc:hover{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.22);color:#dc2626;}
.meye{font-family:var(--display);font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--org);margin-bottom:4px;}
.mtit{font-family:var(--serif);font-size:1.6rem;color:var(--ink);font-weight:700;}
.mdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(249,115,22,.3),transparent);margin:18px 0;}
 
/* ══════════════════════════════════════════════════════
   WELCOME BAR
══════════════════════════════════════════════════════ */
.wbar{background:linear-gradient(135deg,var(--ink) 0%,var(--org-d) 100%);color:#fff;padding:10px 28px;text-align:center;font-family:var(--display);font-size:.72rem;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;}
.wbar::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 44px,rgba(255,255,255,.04) 44px,rgba(255,255,255,.04) 88px);}
.wcode{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:6px;padding:2px 10px;font-family:monospace;font-size:.78rem;font-weight:800;letter-spacing:.12em;position:relative;z-index:1;}
.wbar-content{position:relative;z-index:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}
 
/* ══════════════════════════════════════════════════════
   LIVE NOTIFICATION POPUP
══════════════════════════════════════════════════════ */
.lnpop{position:fixed;top:80px;right:24px;z-index:600;width:320px;background:rgba(253,250,246,.98);backdrop-filter:blur(24px);border:1.5px solid rgba(249,115,22,.2);border-radius:var(--r);padding:16px;box-shadow:var(--s3);animation:lnin .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes lnin{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}
.lnout{animation:lnout .35s cubic-bezier(.22,1,.36,1) forwards!important;}
@keyframes lnout{to{opacity:0;transform:translateX(70px);}}
.lnhdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.lntype{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
 
/* ══════════════════════════════════════════════════════
   HERO SECTION
══════════════════════════════════════════════════════ */
.hero{max-width:1440px;margin:0 auto;padding:76px 28px 56px;position:relative;}
.hero-bg-img{position:absolute;inset:0;background-image:url('./assets/ch1.png');background-size:cover;background-position:center 30%;opacity:.04;border-radius:32px;pointer-events:none;}
.heye{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.28);border-radius:99px;padding:5px 16px;font-family:var(--display);font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--org);margin-bottom:22px;animation:fadeUp .7s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.hdot{width:6px;height:6px;background:var(--org);border-radius:50%;box-shadow:0 0 6px rgba(249,115,22,.6);}
.hh{font-family:var(--serif);font-size:clamp(2.8rem,5vw,5rem);font-weight:700;line-height:1.04;color:var(--ink);margin-bottom:18px;letter-spacing:-.025em;max-width:780px;animation:fadeUp .7s .08s ease both;}
.hh em{font-style:italic;background:linear-gradient(125deg,var(--org) 0%,#f59e0b 55%,var(--org-d) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hsub{font-size:.98rem;color:var(--T3);line-height:1.85;max-width:480px;margin-bottom:36px;font-weight:400;animation:fadeUp .7s .16s ease both;}
.hctas{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:56px;animation:fadeUp .7s .22s ease both;}
.hstats{display:flex;flex-wrap:wrap;border-top:1px solid rgba(249,115,22,.18);padding-top:28px;animation:fadeUp .7s .28s ease both;}
.sti{padding-right:32px;margin-right:32px;border-right:1px solid rgba(249,115,22,.15);}
.sti:last-child{border-right:none;padding-right:0;margin-right:0;}
.stn{font-family:var(--serif);font-size:2.2rem;color:var(--ink);font-weight:700;letter-spacing:-.02em;line-height:1;}
.stl{font-family:var(--display);font-size:.68rem;color:var(--T3);margin-top:4px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
 
/* Floating deco cards */
.hdeco{position:absolute;right:0;top:50%;transform:translateY(-50%);width:36%;max-width:480px;display:flex;flex-direction:column;gap:14px;pointer-events:none;}
@media(max-width:1100px){.hdeco{display:none;}}
.dc{background:rgba(255,255,255,.82);backdrop-filter:blur(22px);border:1.5px solid rgba(249,115,22,.12);border-radius:var(--r);padding:18px 22px;box-shadow:var(--s3);animation:dcFloat 5s ease-in-out infinite;}
.dc.dk{background:linear-gradient(135deg,var(--ink),#0f2040);border-color:rgba(255,255,255,.08);animation-delay:-2.5s;}
.dc:nth-child(3){animation-delay:-1.3s;}
@keyframes dcFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
 
/* ══════════════════════════════════════════════════════
   JUMBOTRON

/* ══════════════════════════════════════════════════════
   PRODUCT CARD
   ─────────────────────────────────────────────────────
   THE 360° SPIN EFFECT:
   When you hover .pc, the <img> inside .pci starts a
   continuous CSS rotateY animation (spin360).
   A conic-gradient "halo" ring rotates around the image.
   The card itself lifts with a warm orange shadow.
══════════════════════════════════════════════════════ */
.pc{
  background:rgba(255,255,255,.82);
  border:1.5px solid rgba(249,115,22,.08);
  border-radius:20px;
  overflow:visible;
  transition:transform .45s cubic-bezier(.22,1,.36,1),
             box-shadow .45s cubic-bezier(.22,1,.36,1),
             border-color .3s,background .3s;
  position:relative;
  cursor:pointer;
  box-shadow:var(--s1);
}
.pc:hover{
  transform:translateY(-14px) scale(1.016);
  box-shadow:0 32px 64px rgba(11,8,5,.14),0 4px 16px rgba(249,115,22,.14),0 0 0 1.5px rgba(249,115,22,.28);
  border-color:rgba(249,115,22,.28);
  background:#fff;
}
 
/* ── Image stage ── */
.pci{
  position:relative;
  overflow:hidden;
  height:200px;
  border-radius:16px 16px 0 0;
  background:var(--OFF2);
  /* 3D perspective for the spin */
  perspective:800px;
  transform-style:preserve-3d;
}
 
/* ── THE CORE 360° SPIN ──
   Image rotates continuously on Y axis when card is hovered.
   Duration 3.8s = roughly one full spin every 4 seconds.
   cubic-bezier gives it a natural ease-in-out feel. ── */
.pci img{
  width:100%;height:100%;object-fit:cover;display:block;
  transform-origin:center center;
  filter:brightness(.93) saturate(.88);
  transition:filter .4s;
  border-radius:16px 16px 0 0;
  /* No animation by default */
  animation:none;
}
.pc:hover .pci img{
  animation:spin360 3.8s cubic-bezier(.4,0,.2,1) infinite;
  filter:brightness(1.04) saturate(1.15);
}
@keyframes spin360{
  0%  {transform:rotateY(0deg);}
  100%{transform:rotateY(360deg);}
}
 
/* ── Rotating halo ring around the image on hover ── */
.pci::before{
  content:'';
  position:absolute;inset:-4px;
  border-radius:20px 20px 4px 4px;
  /* Conic gradient that creates an arc of orange+sky colour */
  background:conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(249,115,22,.75) 15%,
    rgba(251,146,60,.95) 30%,
    transparent 50%,
    rgba(56,189,248,.6) 65%,
    rgba(125,211,252,.8) 80%,
    transparent 95%,
    transparent 100%
  );
  opacity:0;
  transition:opacity .4s;
  z-index:3;
  pointer-events:none;
  animation:ringRotate 2s linear infinite paused;
  /* Mask: only show the 4px outer ring, hide the centre */
  mask:linear-gradient(#fff,#fff) content-box,linear-gradient(#fff,#fff);
  mask-composite:exclude;
  -webkit-mask:linear-gradient(#fff,#fff) content-box,linear-gradient(#fff,#fff);
  -webkit-mask-composite:destination-out;
  padding:4px;
}
.pc:hover .pci::before{
  opacity:1;
  animation-play-state:running;
}
@keyframes ringRotate{
  from{transform:rotate(0deg);}
  to  {transform:rotate(360deg);}
}
 
/* ── Dark overlay fades in on hover ── */
.pci::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,8,5,.72) 0%,transparent 55%);
  opacity:0;transition:opacity .35s;z-index:2;
  border-radius:16px 16px 0 0;
}
.pc:hover .pci::after{opacity:1;}
 
/* ── Action buttons (3D viewer + add to cart) ── */
.pov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,8,5,.75) 0%,transparent 50%);
  opacity:0;transition:opacity .35s;
  display:flex;align-items:flex-end;padding:14px;gap:8px;
  z-index:4;border-radius:16px 16px 0 0;
}
.pc:hover .pov{opacity:1;}
 
/* ── "360° View" badge that slides up on hover ── */

  transition:opacity .3s,transform .3s;
  pointer-events:none;
}

/* ══════════════════════════════════════════════════════
   SERVICES CARDS
══════════════════════════════════════════════════════ */
.svcc {
  background: rgba(255,255,255,.84);
  border: 1.5px solid rgba(249,115,22,.1);
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: var(--s1);
  transition: transform .42s cubic-bezier(.22,1,.36,1),
              box-shadow .42s cubic-bezier(.22,1,.36,1),
              border-color .28s, background .28s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
/* Animated shimmer sweep on hover */
.svcc::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    110deg,
    transparent 30%,
    rgba(249,115,22,.08) 50%,
    transparent 70%
  );
  transform: translateX(-100%);
  transition: transform .55s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
  z-index: 0;
}
/* Bottom accent bar */
.svcc::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--g, linear-gradient(90deg, var(--org), var(--org-d)));
  transform: scaleX(0);
  transition: transform .38s cubic-bezier(.22,1,.36,1);
  transform-origin: left;
  z-index: 1;
}
.svcc:hover {
  border-color: rgba(249,115,22,.32);
  background: #fff;
  box-shadow:
    0 20px 48px rgba(249,115,22,.14),
    0 4px 16px rgba(11,8,5,.08),
    0 0 0 1px rgba(249,115,22,.18);
  transform: translateY(-10px) scale(1.02);
}
.svcc:hover::before { transform: translateX(100%); }
.svcc:hover::after  { transform: scaleX(1); }

/* Icon lifts and rotates on hover */
.svcc:hover .svic {
  transform: scale(1.15) rotate(-6deg);
  box-shadow: 0 8px 20px rgba(249,115,22,.22);
}
/* Arrow appears on hover */
.svcc:hover .svc-arrow { opacity: 1; transform: translateX(0); }
.svc-arrow {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--display); font-size: .66rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--org);
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity .3s, transform .3s cubic-bezier(.22,1,.36,1);
  margin-top: 12px;
  position: relative; z-index: 1;
}
.svc-arrow svg { width: 13px; height: 13px; transition: transform .28s; }
.svcc:hover .svc-arrow svg { transform: translateX(3px); }

.svic {
  width: 52px; height: 52px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; flex-shrink: 0;
  position: relative; z-index: 1;
  transition: transform .38s cubic-bezier(.22,1,.36,1),
              box-shadow .38s;
}
.svic svg { width: 24px; height: 24px; }x;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;flex-shrink:0;}

.hero-photo-panel {

/* Warm cinematic colour grade overlay */
.hero-grade {

    /* Warm golden top-left light bleed */
    radial-gradient(ellipse 70% 60% at 20% 15%,

    /* Cool shadow in bottom-right corner */
    radial-gradient(ellipse 50% 50% at 85% 90%,

  will-change: transform, opacity;

/* 12 individual particles with varied sizes, positions, speeds */
.p1  { width:3px; height:3px; left:8%;  top:75%; animation-duration:14s; animation-delay:0s;   opacity:.85; }
.p2  { width:2px; height:2px; left:14%; top:55%; animation-duration:18s; animation-delay:-3s;  opacity:.65; }
.p3  { width:4px; height:4px; left:22%; top:80%; animation-duration:11s; animation-delay:-6s;  opacity:.9; }
.p4  { width:2px; height:2px; left:31%; top:60%; animation-duration:16s; animation-delay:-1s;  opacity:.6; }
.p5  { width:3px; height:3px; left:38%; top:70%; animation-duration:13s; animation-delay:-8s;  opacity:.75; }
.p6  { width:5px; height:5px; left:18%; top:85%; animation-duration:20s; animation-delay:-4s;  opacity:.5; }
.p7  { width:2px; height:2px; left:42%; top:50%; animation-duration:15s; animation-delay:-2s;  opacity:.7; }
.p8  { width:3px; height:3px; left:28%; top:40%; animation-duration:17s; animation-delay:-9s;  opacity:.6; }
.p9  { width:2px; height:2px; left:10%; top:30%; animation-duration:12s; animation-delay:-5s;  opacity:.55; }
.p10 { width:4px; height:4px; left:46%; top:65%; animation-duration:19s; animation-delay:-7s;  opacity:.45; }
.p11 { width:2px; height:2px; left:35%; top:90%; animation-duration:22s; animation-delay:-11s; opacity:.7; }
.p12 { width:3px; height:3px; left:5%;  top:45%; animation-duration:16s; animation-delay:-13s; opacity:.5; }
 
@keyframes particleDrift {
  0%   { transform: translate(0, 0) rotate(0deg);   opacity: 0; }
  8%   { opacity: var(--op, .75); }
  88%  { opacity: var(--op, .75); }

const fmt=n=>'R'+Number(n).toLocaleString('en-ZA');
let toastTimer=null;
function toast(msg,type='info',icon='ℹ️'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  clearTimeout(toastTimer);
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span class="tst">${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),4000);
}

/* LIVE NOTIFICATION POPUP */
let lnTimer=null;
function showLiveNotif(title,msg,type='info',icon='🔔'){
  document.querySelectorAll('.lnpop').forEach(e=>e.remove());
  clearTimeout(lnTimer);
  const colors={info:'rgba(20,71,230,.12)',success:'rgba(5,150,105,.12)',warn:'rgba(217,119,6,.12)',alert:'rgba(220,38,38,.12)'};
  const el=document.createElement('div');
  el.className='lnpop';
  el.innerHTML=`
    <div class="lnhdr">
      <div class="lntype" style="background:${colors[type]||colors.info};">${icon}</div>
      <div style="flex:1;">
        <div style="font-size:12.5px;font-weight:700;color:var(--N800);">${title}</div>
      </div>
      <button onclick="this.closest('.lnpop').remove()" style="background:none;border:none;color:var(--T3);cursor:pointer;font-size:16px;padding:2px;">✕</button>
    </div>
    <p style="font-size:12px;color:var(--T3);line-height:1.55;font-weight:500;">${msg}</p>
    <div style="font-size:10px;color:var(--T4);margin-top:6px;font-weight:600;">${new Date().toLocaleTimeString()}</div>
  `;
  document.body.appendChild(el);
  lnTimer=setTimeout(()=>{el.classList.add('lnout');setTimeout(()=>el.remove(),400);},5000);
}

/* PUSH NOTIFICATION */
function pushNotif(email,title,message,type='info',icon='🔔',orderId=null){
  const n=getNotifs();
  n.unshift({id:Date.now(),email,title,message,type,icon,orderId,at:new Date().toISOString(),read:false});
  setNotifs(n);
  const u=getUser();
  if(u&&u.email===email){
    showLiveNotif(title,message,type,icon);
    // Update badge in UI
    setTimeout(updateNotifBadge,100);
  }
}

function updateNotifBadge(){
  const u=getUser();if(!u)return;
  const unread=getNotifs().filter(n=>n.email===u.email&&!n.read).length;
  const badge=document.getElementById('notif-badge');
  if(badge){
    badge.textContent=unread>0?unread:'';
    badge.style.display=unread>0?'flex':'none';
    if(unread>0)badge.classList.add('nd-pop');
  }
  // Admin badge
  if(u.role==='admin'){
    const adminUnread=getNotifs().filter(n=>n.email==='admin@cqc.co.za'&&!n.read).length;
    const ab=document.getElementById('admin-notif-badge');
    if(ab){
      ab.textContent=adminUnread>0?adminUnread:'';
      ab.style.display=adminUnread>0?'flex':'none';
      if(adminUnread>0)ab.classList.add('nd-pop');
    }
    const sb=document.getElementById('svc-badge');
    if(sb){
      const svcPending=getSvcs().filter(s=>s.status==='pending').length;
      sb.textContent=svcPending>0?svcPending:'';
      sb.style.display=svcPending>0?'flex':'none';
    }
  }
}

const userNotifs=email=>getNotifs().filter(n=>n.email===email).sort((a,b)=>b.id-a.id);
function readNotif(id){
  const n=getNotifs();const i=n.findIndex(x=>x.id===id);
  if(i>-1){n[i].read=true;setNotifs(n);}
  updateNotifBadge();
}
function readAllNotifs(email){
  const n=getNotifs();n.filter(x=>x.email===email).forEach(x=>x.read=true);setNotifs(n);updateNotifBadge();
}

function M(html,cls=''){
  const bd=document.createElement('div');bd.className='mbg';
  bd.innerHTML=`<div class="mbox ${cls}">${html}</div>`;
  document.body.appendChild(bd);
  bd.addEventListener('click',e=>{if(e.target===bd)bd.remove();});
  return bd;
}
const mclose=`<button class="mc" onclick="this.closest('.mbg').remove()">✕</button>`;

function genCode(prefix){
  return prefix+Math.random().toString(36).substring(2,7).toUpperCase();
}

function switchAuth(t){
  const lf=document.getElementById('lform'),rf=document.getElementById('rform');
  if(lf)lf.style.display=t==='login'?'block':'none';
  if(rf)rf.style.display=t==='register'?'block':'none';
  document.querySelectorAll('#atabs .tab').forEach((tb,i)=>tb.classList.toggle('on',(i===0&&t==='login')||(i===1&&t==='register')));
}
function doLogin(){
  const email=document.getElementById('le')?.value?.trim();
  const pw=document.getElementById('lp')?.value;
  // Check seed users + registered
  const all=[...SEED_USERS,...getRegistered()];
  const user=all.find(u=>u.email===email&&u.pw===pw);
  if(user){
    setUser(user);
    document.querySelectorAll('.mbg').forEach(m=>m.remove());
    toast(`Welcome back, ${user.name.split(' ')[0]}!`,'success','👋');
    if(window._authCb){window._authCb();window._authCb=null;}
    else if(user.role==='admin')renderAdmin();
    else renderHome();
  } else toast('Invalid email or password','error','✕');
}
function doRegister(){
  const fn=document.getElementById('rfn')?.value?.trim();
  const ln=document.getElementById('rln')?.value?.trim();
  const email=document.getElementById('re')?.value?.trim();
  const ph=document.getElementById('rph')?.value?.trim();
  const pw=document.getElementById('rp')?.value;
  if(!fn||!email||!pw){toast('Please fill all required fields','error','✕');return;}
  if(pw.length<6){toast('Password must be at least 6 characters','warn','⚠️');return;}
  const all=[...SEED_USERS,...getRegistered()];
  if(all.find(u=>u.email===email)){toast('This email is already registered','error','✕');return;}
  const code=genCode('WELCOME');
  const newUser={
    id:'u'+Date.now(),email,pw,name:`${fn} ${ln}`.trim(),role:'customer',
    phone:ph,address:'',wl:[],pts:0,
    createdAt:new Date().toISOString(),
    welcomed:false,
    discountCode:code,
    discountPct:10,
  };
  const reg=getRegistered();reg.push(newUser);setRegistered(reg);
  setUser(newUser);
  document.querySelectorAll('.mbg').forEach(m=>m.remove());
  // Notify admin
  pushNotif('admin@cqc.co.za','🎉 New Registration!',`${newUser.name} (${email}) just signed up.`,'success','👤');
  // Show welcome modal to user
  setTimeout(()=>showWelcomeModal(newUser),400);
  renderHome();
}

      <div class="v3hud">⟳ Drag to rotate · Scroll to zoom · Tap colour to tint</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap;">
      <span style="font-size:9.5px;font-weight:700;color:var(--T3);letter-spacing:.14em;text-transform:uppercase;">Material</span>
      ${['#0a1628','#1447e6','#2d3748','#7c1d1d','#064e3b','#4c1d95','#b45309'].map(c=>`<button onclick="set3Tint('${c}')" style="width:24px;height:24px;background:${c};border-radius:50%;border:2.5px solid rgba(255,255,255,.75);cursor:pointer;transition:transform .2s;box-shadow:0 2px 7px rgba(0,0,0,.18);" onmouseover="this.style.transform='scale(1.35)'" onmouseout="this.style.transform='scale(1)'"></button>`).join('')}
      <button class="btn bg bsm" onclick="reset3D()" style="margin-left:auto;">↺ Reset</button>
      <button class="btn bp bsm" onclick="handleCart(${p.id});this.closest('.mbg').remove();" style="margin-left:4px;">Add to Cart</button>
    </div>
    <div class="mdiv"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;">
      <p style="font-size:12.5px;color:var(--T3);line-height:1.65;max-width:64%;font-weight:400;">${p.desc}</p>
      <div style="text-align:right;">
        ${p.sale?`<div style="font-size:12px;color:var(--T4);text-decoration:line-through;">${fmt(p.price)}</div>`:''}
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--N800);">${fmt(p.sale||p.price)}</div>
      </div>
    </div>
  `,'wd');

  const wrap=document.getElementById('v3wrap');
  const cv=document.getElementById('cv3'),ctx=cv.getContext('2d');
  const img=new Image();img.crossOrigin='anonymous';img.src=p.img;
  let animId=null;

  function draw(){
    const W=cv.width=wrap.clientWidth||760,H=cv.height=wrap.clientHeight||360;
    ctx.clearRect(0,0,W,H);
    frame++;

    /* — BACKGROUND gradient — */
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.65);
    bg.addColorStop(0,'#0f2040');bg.addColorStop(1,'#03060f');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    ctx.save();ctx.translate(W/2,H/2);ctx.scale(zoom,zoom);

    /* — ORBIT RINGS (3 rings at different angles) — */
    const rings=[
      {rx:160,ry:40,a:rY*.012,col:'rgba(110,165,255,0.22)',thick:1.5},
      {rx:200,ry:55,a:rY*.008+0.6,col:'rgba(56,130,255,0.14)',thick:1},
      {rx:130,ry:30,a:rY*.018-0.3,col:'rgba(147,197,255,0.18)',thick:1},
    ];
    rings.forEach(({rx,ry,a,col,thick})=>{
      ctx.save();ctx.rotate(a);
      ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=thick;ctx.stroke();
      /* orbit dot */
      const ox=Math.cos(frame*.025)*rx,oy=Math.sin(frame*.025)*ry;
      ctx.beginPath();ctx.arc(ox,oy,3,0,Math.PI*2);ctx.fillStyle='rgba(110,165,255,0.55)';ctx.fill();
      ctx.restore();
    });

    /* — GRID PLANE — */
    ctx.strokeStyle='rgba(20,71,230,.07)';ctx.lineWidth=1;
    const skX=rY*.5,skY=rX*.3;
    for(let i=-300;i<=300;i+=50){
      ctx.beginPath();ctx.moveTo(i,-180);ctx.lineTo(i+rY*.28,180);ctx.stroke();
    }
    for(let i=-180;i<=180;i+=50){
      ctx.beginPath();ctx.moveTo(-300,i);ctx.lineTo(300,i+rX*.18);ctx.stroke();
    }

    /* — SHADOW — */
    ctx.shadowColor='rgba(20,71,230,.55)';ctx.shadowBlur=36;

    /* — PRODUCT IMAGE with perspective warp — */
    const IW=192,IH=192;
    ctx.save();
    ctx.transform(1,skY*.010,skX*.010,1,-skX*.48,-skY*.48);
    if(img.complete&&img.naturalWidth>0)ctx.drawImage(img,-IW/2,-IH/2,IW,IH);
    /* tint overlay */
    if(tint){ctx.globalAlpha=.26;ctx.fillStyle=tint;ctx.fillRect(-IW/2,-IH/2,IW,IH);ctx.globalAlpha=1;}
    /* holographic shimmer */
    const shim=ctx.createLinearGradient(-IW/2,-IH/2,IW/2,IH/2);
    const sh=((frame*.012)%1);
    shim.addColorStop(Math.max(0,sh-.3),'rgba(255,255,255,0)');
    shim.addColorStop(sh,'rgba(255,255,255,0.14)');
    shim.addColorStop(Math.min(1,sh+.3),'rgba(255,255,255,0)');
    ctx.globalAlpha=.7;ctx.fillStyle=shim;ctx.fillRect(-IW/2,-IH/2,IW,IH);ctx.globalAlpha=1;
    ctx.restore();
    ctx.shadowBlur=0;

    /* — CORNER BRACKETS — */
    ctx.strokeStyle='rgba(110,165,255,.80)';ctx.lineWidth=2.5;
    const bx=-IW/2-skX*.3,by=-IH/2-skY*.3;
    [[bx,by+22,bx,by,bx+22,by],[bx+IW-22,by,bx+IW,by,bx+IW,by+22],
     [bx,by+IH-22,bx,by+IH,bx+22,by+IH],[bx+IW-22,by+IH,bx+IW,by+IH,bx+IW,by+IH-22]
    ].forEach(pts=>{ctx.beginPath();ctx.moveTo(pts[0],pts[1]);ctx.lineTo(pts[2],pts[3]);ctx.lineTo(pts[4],pts[5]);ctx.stroke();});

    /* — DATA READOUT (HUD) — */
    ctx.fillStyle='rgba(110,165,255,.55)';ctx.font='bold 9px Montserrat,sans-serif';
    ctx.fillText(`ROT ${Math.round(rY*180/Math.PI*100)/100}°`,bx+2,by+IH+16);
    ctx.fillText(`ZOOM ${zoom.toFixed(2)}×`,bx+2,by+IH+28);

    ctx.restore();
    animId=requestAnimationFrame(draw);
  }

  wrap.onmousedown=e=>{drag=true;lX=e.clientX;lY=e.clientY;wrap.style.cursor='grabbing';};
  window._3mv=e=>{if(!drag)return;rY+=(e.clientX-lX)*.008;rX+=(e.clientY-lY)*.008;rX=Math.min(.6,Math.max(-.6,rX));lX=e.clientX;lY=e.clientY;};
  window._3mu=()=>{drag=false;wrap.style.cursor='grab';};
  window.addEventListener('mousemove',window._3mv);window.addEventListener('mouseup',window._3mu);
  cv.onwheel=e=>{e.preventDefault();zoom=Math.min(2.2,Math.max(.35,zoom-e.deltaY*.004));};
  window.set3Tint=c=>{tint=c;};
  window.reset3D=()=>{rX=0;rY=0;zoom=1;tint=null;};

  /* touch support */
  let tLast=null;
  cv.addEventListener('touchstart',e=>{tLast={x:e.touches[0].clientX,y:e.touches[0].clientY};drag=true;},{passive:true});
  cv.addEventListener('touchmove',e=>{if(!drag||!tLast)return;rY+=(e.touches[0].clientX-tLast.x)*.008;rX+=(e.touches[0].clientY-tLast.y)*.008;tLast={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  cv.addEventListener('touchend',()=>{drag=false;tLast=null;},{passive:true});

  m.addEventListener('click',e=>{
    if(e.target===m){
      cancelAnimationFrame(animId);
      window.removeEventListener('mousemove',window._3mv);
      window.removeEventListener('mouseup',window._3mu);
    }
  });
  img.onload=draw;draw();
}

  else if(lower.includes('sign in')){document.getElementById('chatWin').style.display='none';chatOpen=false;showLogin();return;}
  else if(lower.includes('view my orders')){document.getElementById('chatWin').style.display='none';chatOpen=false;showOrdersModal();return;}

function renderJumbo(){
  const slides=getSlides();if(!slides.length)return '';
  return `<div class="jwrap">
    <div class="jumbo">
      <div class="jtrack" id="jtrack">
        ${slides.map((s,i)=>`

          <div class="jbg" style="background-image:url('${s.img}');"></div>

              ${s.cta||'Shop Now'} →

          </div>
        </div>`).join('')}
      </div>
      <button class="jarr jp" onclick="jGo(-1)">‹</button>
      <button class="jarr jn" onclick="jGo(1)">›</button>
      <div class="jnav">
        ${slides.map((_,i)=>`<button class="jdot ${i===0?'on':''}" onclick="jSet(${i})" id="jd${i}"></button>`).join('')}

function jGo(d){const s=getSlides();jIdx=(jIdx+d+s.length)%s.length;jSet(jIdx);}
function jSet(i){
  jIdx=i;
  const t=document.getElementById('jtrack');if(t)t.style.transform=`translateX(-${i*100}%)`;
  document.querySelectorAll('.jdot').forEach((d,j)=>d.classList.toggle('on',j===i));
  clearInterval(jTimer);jTimer=setInterval(()=>jGo(1),5500);
}
function startJumbo(){clearInterval(jTimer);jTimer=setInterval(()=>jGo(1),5500);}

function handleCart(pid){

let discountApplied=0;
function applyDiscount(){
  const code=document.getElementById('cdc')?.value?.trim().toUpperCase();
  const u=getUser();
  const all=[...SEED_USERS,...getRegistered()];
  const owner=all.find(x=>x.discountCode===code);
  const tot=window._checkoutTotal||0;
  if(owner&&(owner.id===u?.id||owner.email===u?.email)){
    discountApplied=Math.round(tot*(owner.discountPct||10)/100);
    const newTot=tot-discountApplied;
    document.getElementById('dcsuccess').style.display='block';
    document.getElementById('dcsuccess').textContent=`✓ ${owner.discountPct||10}% discount applied! You save ${fmt(discountApplied)}`;
    document.getElementById('checkoutTotal').textContent=fmt(newTot);
    document.querySelector('[onclick^="goPay"]').setAttribute('onclick',`goPay(${newTot})`);
    document.querySelector('[onclick^="goPay"]').textContent=`Pay ${fmt(newTot)} via PayFast →`;
    toast(`Discount applied — saving ${fmt(discountApplied)}!`,'success','🎉');
  } else {
    toast('Invalid or expired discount code','error','✕');
  }
}

function placeOrder(amount){
  const cart=getCart(),u=getUser();if(!cart.length||!u)return;
  const orders=getOrders();
  const o={
    id:Date.now(),
    orderNumber:'CQC-'+Date.now().toString().slice(-8),
    items:cart,total:amount,
    status:'pending',
    progress:0,
    updates:[{at:new Date().toISOString(),msg:'Order placed — awaiting admin approval',type:'placed'}],
    customer:u,
    createdAt:new Date().toISOString(),
    address:u.address||'JHB, Gauteng',
    invoiceId:'INV-'+Math.random().toString(36).slice(2,8).toUpperCase(),
    deliverySteps:['Order Placed','Approved','Processing','In Transit','Out for Delivery','Delivered'],
    currentStep:0,
  };
  orders.unshift(o);setOrders(orders);setCart([]);
  discountApplied=0;
  // Notify admin
  pushNotif('admin@cqc.co.za','📦 New Order',`#${o.orderNumber} from ${u.name} — ${fmt(amount)}`,'success','📦',o.id);
  // Notify customer
  pushNotif(u.email,'Order Confirmed!',`Your order #${o.orderNumber} is confirmed. We'll notify you on every update.`,'success','🎉',o.id);

  setTimeout(()=>showOrderConfirm(o),500);
}

        <div style="position:absolute;top:50%;left:${Math.max(2,Math.min(92,pct))}%;transform:translateY(-80%) translateX(-50%);font-size:22px;z-index:3;transition:left 1s ease;">🚚</div>

function pickSvc(id,title){
  document.querySelectorAll('[id^="sc_"]').forEach(el=>{el.style.borderColor='';el.style.background='rgba(255,255,255,.84)';});
  const el=document.getElementById('sc_'+id);
  if(el){el.style.borderColor='rgba(20,71,230,.42)';el.style.background='rgba(20,71,230,.06)';}
  const tf=document.getElementById('svtype');if(tf)tf.value=title;
  const sf=document.getElementById('svform');if(sf)sf.style.display='block';
}
function submitSvc(){
  const type=document.getElementById('svtype')?.value;
  const desc=document.getElementById('svdesc')?.value;
  const date=document.getElementById('svdate')?.value;
  const bud=document.getElementById('svbud')?.value;
  if(!desc){toast('Please describe your request','error','✕');return;}
  const u=getUser();
  const svcs=getSvcs();
  svcs.unshift({id:Date.now(),type,description:desc,date,budget:bud,customer:u,status:'pending',createdAt:new Date().toISOString()});
  setSvcs(svcs);
  pushNotif('admin@cqc.co.za','🔧 New Service Request',`${type} from ${u.name} (${u.email})`,'success','🔧');
  pushNotif(u.email,'Service Request Submitted!',`Your ${type} request is received. We'll contact you within 24 hours.`,'success','✓');
  document.querySelectorAll('.mbg').forEach(m=>m.remove());
  toast('Service request submitted! Expect a call within 24 hours.','success','✓');
}

function adminApprove(id){
  const orders=getOrders(),o=orders.find(x=>x.id===id);
  if(o&&o.status==='pending'){
    o.status='approved';
    o.currentStep=1;
    o.updates.push({at:new Date().toISOString(),msg:'Order approved by admin — being prepared'});
    setOrders(orders);
    pushNotif(o.customer.email,'✅ Order Approved!',`Great news! Your order #${o.orderNumber} has been approved and is now being prepared for dispatch.`,'success','✅',o.id);
    toast('Order approved — customer notified!','success','✅');
    renderAdmin();
  }
}
function adminUpdate(id,msg){
  if(!msg?.trim()){toast('Enter a message first','warn','⚠️');return;}
  const orders=getOrders(),o=orders.find(x=>x.id===id);
  if(o){o.updates.push({at:new Date().toISOString(),msg:msg.trim()});setOrders(orders);pushNotif(o.customer.email,'📬 Order Update',msg.trim(),'info','📬',o.id);toast('Update sent to customer','success','📢');renderAdmin();}
}
function adminSetStatus(id,status){
  const orders=getOrders(),o=orders.find(x=>x.id===id);
  if(!o)return;
  const steps={'approved':1,'progress':2,'shipped':3,'delivered':5};
  o.status=status;
  o.currentStep=steps[status]||0;
  const msgs={
    approved:'Order approved and in preparation.',
    progress:'Your order is currently being processed in our warehouse.',
    shipped:'Your order has been dispatched! Your delivery is on its way.',
    delivered:'Your order has been delivered. Thank you for choosing CQC!'
  };
  const icons={approved:'✅',progress:'⚙️',shipped:'🚚',delivered:'📦'};
  o.updates.push({at:new Date().toISOString(),msg:msgs[status]||`Status: ${status}`});
  setOrders(orders);
  pushNotif(o.customer.email,`${icons[status]||'📬'} ${status.charAt(0).toUpperCase()+status.slice(1)}`,msgs[status]||`Order #${o.orderNumber} is now ${status}`,status==='delivered'?'success':'info',icons[status]||'📬',o.id);

  renderAdmin();
}

function updateProd(id){
  const prods=getProds(),i=prods.findIndex(x=>x.id===id);if(i<0)return;
  const sp=parseFloat(document.getElementById('es')?.value);
  prods[i]={...prods[i],

    cat:document.getElementById('ec')?.value||prods[i].cat,
    price:parseFloat(document.getElementById('ep')?.value)||prods[i].price,
    sale:isNaN(sp)||sp===0?null:sp,
    stock:parseInt(document.getElementById('eq')?.value)||0,
    desc:document.getElementById('ed')?.value||prods[i].desc,
    spec:document.getElementById('esp')?.value||prods[i].spec,
    img:document.getElementById('ei')?.value||prods[i].img,
    tags:(document.getElementById('et')?.value||'').split(',').map(t=>t.trim()).filter(Boolean),
  };

function savePromo(){

    title:document.getElementById('bh')?.value||'Special Offer',

  const months=Object.entries(byM).slice(-8);const maxV=Math.max(...months.map(([,v])=>v),1);
  return `<div>
    <div style="font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--B600);margin-bottom:16px;">Analytics & Reports</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px;">
      ${[{lb:'Total Revenue',val:fmt(revenue),ic:'💰'},{lb:'Avg Order Value',val:fmt(Math.round(avgOrder)),ic:'💳'},{lb:'Conversion Rate',val:convRate+'%',ic:'📈'},{lb:'Total Orders',val:orders.length,ic:'📦'}].map(s=>`<div class="ac"><div style="font-size:22px;">${s.ic}</div><div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--N800);margin-top:8px;">${s.val}</div><div style="font-size:9.5px;font-weight:700;color:var(--T3);text-transform:uppercase;letter-spacing:.12em;margin-top:4px;">${s.lb}</div></div>`).join('')}
    </div>
    <div class="ac" style="margin-bottom:20px;">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--B600);margin-bottom:14px;">Revenue by Month</div>
      ${months.length===0?'<p style="color:var(--T3);">No data yet</p>':`
      <div style="display:flex;align-items:flex-end;gap:8px;height:160px;">
        ${months.map(([m,v])=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="font-size:9px;font-weight:700;color:var(--B600);writing-mode:vertical-lr;transform:rotate(180deg);">${fmt(v).replace('R','R')}</div>
          <div style="width:100%;background:linear-gradient(to top,var(--N800),var(--B400));border-radius:5px 5px 0 0;height:${Math.round(v/maxV*120)}px;min-height:4px;transition:height .5s;"></div>
          <div style="font-size:9px;color:var(--T3);white-space:nowrap;font-weight:600;">${m}</div>
        </div>`).join('')}
      </div>`}
    </div>
    <div class="ac">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--B600);margin-bottom:14px;">Top Products</div>
      ${top5.length===0?'<p style="color:var(--T3);">No sales data yet</p>':top5.map((p,i)=>`
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <span style="font-size:12.5px;font-weight:700;color:var(--N800);">${p.n}</span>
          <span style="font-size:12.5px;font-weight:700;color:var(--B600);">${fmt(p.r)}</span>
        </div>
        <div class="pb"><div class="pf" style="width:${Math.round(p.q/Math.max(top5[0].q,1)*100)}%;background:linear-gradient(90deg,var(--N800),var(--B400));"></div></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function adminSendNotif(){
  const email=document.getElementById('ne')?.value,title=document.getElementById('nt')?.value,message=document.getElementById('nm')?.value;
  if(!email||!title||!message){toast('Please fill all fields','warn','⚠️');return;}
  pushNotif(email,title,message,'info','✉️');
  toast(`Notification sent to ${email}!`,'success','📢');
  document.getElementById('nt').value='';document.getElementById('nm').value='';
  renderAdmin();
}

<script>
(function(){
  const cur=document.getElementById('cqc-cursor');if(!cur)return;
  document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
  document.addEventListener('mousedown',()=>cur.classList.add('click'));
  document.addEventListener('mouseup',()=>cur.classList.remove('click'));
  const BIG='button,a,.pc,.cat,.svcc,.pfav,.bic,.jdot,.jarr,.aside-btn,.tab,.cchip,select,input,textarea,.soc,.qb';
  document.addEventListener('mouseover',e=>{e.target.closest(BIG)?cur.classList.add('big'):cur.classList.remove('big');});
})();
</script>

<script>
(function() {
  // ── Ken-burns: load the bg photo and trigger the slow zoom-out ──
  const photo = document.getElementById('heroBgPhoto');
  if (photo) {
    const img = new Image();
    img.onload = () => { photo.classList.add('ready'); };
    img.src = 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200&q=90&auto=format&fit=crop';
  }
 
  // ── Set individual opacity CSS vars on particles ──
  const opacities = [.85,.65,.9,.6,.75,.5,.7,.6,.55,.45,.7,.5];
  document.querySelectorAll('.particle').forEach((p, i) => {
    p.style.setProperty('--op', opacities[i] ?? .6);
  });
 
  // ── Subtle mouse parallax on the photo ──
  const panel = document.getElementById('heroPhotoPanel');
  const bg    = document.getElementById('heroBgPhoto');
  if (panel && bg) {
    let tX = 0, tY = 0, rX = 0, rY = 0;
    document.addEventListener('mousemove', e => {
      const { innerWidth: W, innerHeight: H } = window;
      tX = ((e.clientX / W) - .5) * 14;
      tY = ((e.clientY / H) - .5) * 9;
    });
    (function loop() {
      // Lerp for smooth follow
      rX += (tX - rX) * .06;
      rY += (tY - rY) * .06;
      if (bg) bg.style.transform = `scale(1) translate(${rX}px, ${rY}px)`;
      requestAnimationFrame(loop);
    })();
  }
})();
</script>
